<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ランダム散歩</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card-border: #0f3460;
    --accent: #e94560;
    --accent2: #53d8fb;
    --accent3: #ffc857;
    --text: #e8e8e8;
    --text-dim: #7a8ba6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans JP', 'DM Mono', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh; width: 100vw;
    overflow: hidden; position: relative;
  }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

  #direction-banner {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 12px 16px;
    padding-top: max(env(safe-area-inset-top, 12px), 12px);
    background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.7) 80%, transparent 100%);
    text-align: center; pointer-events: none; transition: opacity 0.4s;
  }
  #direction-banner.hidden { opacity: 0; }
  .dir-label {
    font-size: 11px; letter-spacing: 0.15em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 4px; font-family: 'DM Mono', monospace;
  }
  .dir-main { font-size: 32px; font-weight: 900; line-height: 1.2; text-shadow: 0 2px 20px rgba(233,69,96,0.4); }
  .dir-sub { font-size: 13px; color: var(--accent2); margin-top: 4px; font-family: 'DM Mono', monospace; }

  #gps-info {
    position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    z-index: 999; pointer-events: none; transition: opacity 0.3s;
  }
  #gps-info.hidden { opacity: 0; }
  .gps-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 3px 10px; border-radius: 12px;
    background: rgba(22,33,62,0.9); border: 1px solid var(--card-border);
  }
  .gps-dot { width: 7px; height: 7px; border-radius: 50%; transition: background 0.3s; }

  #bottom-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    padding: 0 16px 16px;
    padding-bottom: calc(max(env(safe-area-inset-bottom, 16px), 16px) + 60px);
    background: linear-gradient(0deg, rgba(26,26,46,0.97) 0%, rgba(26,26,46,0.88) 55%, rgba(26,26,46,0.5) 80%, transparent 100%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .stats-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .stat-item { text-align: center; min-width: 70px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--accent2); }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .btn-main {
    font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 900;
    padding: 14px 44px; border: none; border-radius: 50px; cursor: pointer;
    letter-spacing: 0.05em; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .btn-main:active { transform: scale(0.95); }
  .btn-start { background: var(--accent); color: #fff; box-shadow: 0 4px 24px rgba(233,69,96,0.4); }
  .btn-stop { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-row { display: flex; gap: 10px; }

  #style-switcher {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001;
    padding-bottom: max(env(safe-area-inset-bottom, 8px), 8px);
    display: flex; justify-content: center; gap: 6px; padding-top: 6px;
    background: rgba(26,26,46,0.97); border-top: 1px solid rgba(255,255,255,0.06);
  }
  .style-btn {
    font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 700;
    padding: 5px 12px; border: 1.5px solid var(--card-border); border-radius: 16px;
    background: var(--card); color: var(--text-dim); cursor: pointer;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .style-btn.active { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }

  #roulette-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
    background: rgba(26,26,46,0.85); display: flex; align-items: center; justify-content: center;
    flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  #roulette-overlay.active { opacity: 1; pointer-events: auto; }
  .roulette-text {
    font-size: 14px; color: var(--accent3); margin-bottom: 16px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.2em;
    animation: pulse 0.6s ease infinite alternate;
  }
  .roulette-dir { font-size: 64px; font-weight: 900; transition: all 0.08s; }
  .roulette-name { font-size: 22px; font-weight: 700; margin-top: 8px; color: var(--accent2); }

  #loading-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 3000;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; transition: opacity 0.5s;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loader { width: 48px; height: 48px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 14px; color: var(--text-dim); text-align: center; padding: 0 24px; line-height: 1.7; }

  #toast {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1500;
    background: var(--card); border: 1px solid var(--card-border);
    padding: 10px 20px; border-radius: 24px; font-size: 13px; color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0; pointer-events: none;
    transition: opacity 0.3s; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
  }
  #toast.show { opacity: 1; }
  #sim-badge {
    position: absolute; top: 10px; right: 10px; z-index: 1100;
    background: var(--accent3); color: var(--bg); padding: 4px 10px; border-radius: 12px;
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; display: none;
  }
  #manual-badge {
    position: absolute; top: 10px; right: 10px; z-index: 1100;
    background: var(--accent2); color: var(--bg); padding: 4px 10px; border-radius: 12px;
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; display: none;
  }
  #tap-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 1100; pointer-events: none; display: none;
  }
  .tap-hint-inner {
    background: rgba(22,33,62,0.92); border: 1.5px solid var(--accent2);
    padding: 14px 24px; border-radius: 16px; font-size: 15px; font-weight: 700;
    color: var(--accent2); white-space: nowrap;
    animation: tapPulse 2s ease infinite;
    box-shadow: 0 4px 30px rgba(83,216,251,0.2);
  }
  @keyframes tapPulse { 0%,100%{ opacity:0.85; transform:scale(1); } 50%{ opacity:1; transform:scale(1.03); } }
  .loading-reason {
    margin-top: 12px; padding: 12px 20px; border-radius: 12px;
    background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3);
    font-size: 11px; color: #ccc; line-height: 1.8; max-width: 320px; text-align: left;
  }
  .loading-reason b { color: var(--accent); }
  .loading-btn {
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700;
    padding: 12px 32px; border: none; border-radius: 50px; cursor: pointer;
    margin-top: 12px; background: var(--accent2); color: var(--bg);
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  .leaflet-control-attribution { font-size: 9px !important; }
  .junction-next {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent3); border: 2px solid #fff; box-shadow: 0 0 12px rgba(255,200,87,0.6);
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader"></div>
  <div class="loading-text" id="loading-text">位置情報を取得中...</div>
</div>
<div id="map"></div>
<div id="gps-info" class="hidden">
  <div class="gps-badge"><div class="gps-dot" id="gps-dot"></div><span id="gps-acc-text">GPS: ---</span></div>
</div>
<div id="direction-banner" class="hidden">
  <div class="dir-label">次の方向</div>
  <div class="dir-main" id="dir-main">↑ 北</div>
  <div class="dir-sub" id="dir-sub">次の交差点まで 120m</div>
</div>
<div id="roulette-overlay">
  <div class="roulette-text">▶ 方向を選択中...</div>
  <div class="roulette-dir" id="roulette-dir">↑</div>
  <div class="roulette-name" id="roulette-name">北</div>
</div>
<div id="toast"></div>
<div id="sim-badge">SIMULATION</div>
<div id="manual-badge" style="display:none;">📍 手動モード</div>
<div id="tap-hint" style="display:none;">
  <div class="tap-hint-inner">📍 地図をタップして現在地を設定</div>
</div>
<div id="bottom-panel">
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-item"><div class="stat-val" id="stat-dist">0</div><div class="stat-label">m 歩行</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-junctions">0</div><div class="stat-label">交差点</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-time">0:00</div><div class="stat-label">経過</div></div>
  </div>
  <div class="btn-row">
    <button class="btn-main btn-start" id="btn-start">🎲 ランダム散歩 開始</button>
    <button class="btn-main btn-stop" id="btn-stop" style="display:none;">■ 終了</button>
  </div>
</div>
<div id="style-switcher">
  <button class="style-btn active" data-style="standard">標準</button>
  <button class="style-btn" data-style="dark">ダーク</button>
  <button class="style-btn" data-style="satellite">航空写真</button>
  <button class="style-btn" data-style="pale">淡色</button>
  <button class="style-btn" data-style="topo">地形</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371e3, toR = d => d * Math.PI / 180;
  const dLat = toR(lat2 - lat1), dLon = toR(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function bearing(lat1, lon1, lat2, lon2) {
  const toR = d => d * Math.PI / 180, dLon = toR(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toR(lat2));
  const x = Math.cos(toR(lat1)) * Math.sin(toR(lat2)) - Math.sin(toR(lat1)) * Math.cos(toR(lat2)) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
const DIR_ARROWS = ['↑','↗','→','↘','↓','↙','←','↖'];
const DIR_NAMES = ['北','北東','東','南東','南','南西','西','北西'];
function bearingToDir(b) { const i = Math.round(b / 45) % 8; return { arrow: DIR_ARROWS[i], name: DIR_NAMES[i] }; }

// ═══════════════════════════════════════════════════════════
//  GPS KALMAN FILTER (1D lat + 1D lon)
// ═══════════════════════════════════════════════════════════
class GPSKalman {
  constructor() { this.lat = null; this.lon = null; this.var = -1; this.ts = 0; }
  update(lat, lon, acc, ts) {
    acc = Math.max(acc, 3);
    if (this.var < 0) {
      this.lat = lat; this.lon = lon; this.var = acc * acc; this.ts = ts;
      return { lat, lon };
    }
    const dt = (ts - this.ts) / 1000;
    if (dt > 0) { this.var += dt * 1.5 * 1.5; this.ts = ts; } // process noise ~1.5 m/s walk
    const K = this.var / (this.var + acc * acc);
    this.lat += K * (lat - this.lat);
    this.lon += K * (lon - this.lon);
    this.var *= (1 - K);
    return { lat: this.lat, lon: this.lon };
  }
}

// ═══════════════════════════════════════════════════════════
//  STATIONARY DETECTOR — prevents GPS jitter from counting as movement
// ═══════════════════════════════════════════════════════════
class StationaryDetector {
  constructor() { this.buf = []; this.maxBuf = 15; }
  add(lat, lon, t) {
    this.buf.push({ lat, lon, t });
    if (this.buf.length > this.maxBuf) this.buf.shift();
  }
  isMoving() {
    if (this.buf.length < 4) return false;
    // Net displacement from oldest to newest
    const f = this.buf[0], l = this.buf[this.buf.length - 1];
    const disp = haversine(f.lat, f.lon, l.lat, l.lon);
    const dt = (l.t - f.t) / 1000;
    if (dt < 2) return false;
    const speed = disp / dt;
    // Walking: >0.8 m/s AND net displacement > 5m
    return speed > 0.8 && disp > 5;
  }
}

// ═══════════════════════════════════════════════════════════
//  ROAD GRAPH (same as before)
// ═══════════════════════════════════════════════════════════
class RoadGraph {
  constructor() { this.nodes = new Map(); this.adj = new Map(); this.wayNodes = new Map(); this.nodeWays = new Map(); this.intersections = new Set(); this.segments = []; }
  loadOverpass(data) {
    for (const el of data.elements||[]) { if (el.type==='node') this.nodes.set(el.id,{lat:el.lat,lon:el.lon}); }
    for (const el of data.elements||[]) {
      if (el.type!=='way'||!el.nodes) continue;
      const nds=el.nodes; this.wayNodes.set(el.id,nds);
      for (let i=0;i<nds.length;i++) {
        const nid=nds[i];
        if (!this.nodeWays.has(nid)) this.nodeWays.set(nid,new Set()); this.nodeWays.get(nid).add(el.id);
        if (!this.adj.has(nid)) this.adj.set(nid,new Set());
        if (i>0) { this.adj.get(nid).add(nds[i-1]); if (!this.adj.has(nds[i-1])) this.adj.set(nds[i-1],new Set()); this.adj.get(nds[i-1]).add(nid); }
      }
    }
    for (const [n,nb] of this.adj) { if (nb.size>=3||nb.size===1) this.intersections.add(n); }
    for (const [n,w] of this.nodeWays) { if (w.size>=2&&this.adj.has(n)) this.intersections.add(n); }
    const vis=new Set();
    for (const sid of this.intersections) {
      const sn=this.nodes.get(sid); if(!sn) continue; const nb=this.adj.get(sid); if(!nb) continue;
      for (const nxt of nb) {
        if (vis.has(`${sid}-${nxt}`)) continue;
        const path=[sid]; let cur=nxt,prev=sid,dist=0;
        while(cur&&!this.intersections.has(cur)) {
          path.push(cur); const cn=this.nodes.get(cur),pn=this.nodes.get(prev);
          if(cn&&pn) dist+=haversine(pn.lat,pn.lon,cn.lat,cn.lon);
          const a=this.adj.get(cur); let nx=null; for(const n of a){if(n!==prev){nx=n;break;}} prev=cur;cur=nx;
        }
        if(cur&&this.intersections.has(cur)) {
          path.push(cur); const cn=this.nodes.get(cur),pn=this.nodes.get(prev);
          if(cn&&pn) dist+=haversine(pn.lat,pn.lon,cn.lat,cn.lon);
          vis.add(`${sid}-${path[1]}`); vis.add(`${cur}-${path[path.length-2]}`);
          this.segments.push({from:sid,to:cur,nodeIds:path,coords:path.map(id=>this.nodes.get(id)).filter(Boolean),dist:Math.round(dist)});
        }
      }
    }
  }
  nearest(lat,lon) { let b=null,bd=Infinity; for(const n of this.intersections){const nd=this.nodes.get(n);if(!nd)continue;const d=haversine(lat,lon,nd.lat,nd.lon);if(d<bd){bd=d;b=n;}} return b; }
  segsFrom(id) {
    return this.segments.filter(s=>s.from===id||s.to===id).map(s=>{
      if(s.to===id) return {from:s.to,to:s.from,nodeIds:[...s.nodeIds].reverse(),coords:[...s.coords].reverse(),dist:s.dist};
      return s;
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  MAP TILE STYLES
// ═══════════════════════════════════════════════════════════
const TILES = {
  standard: { url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'&copy; OSM', mz:19 },
  dark:     { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attr:'&copy; OSM &copy; CARTO', mz:20 },
  satellite:{ url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'&copy; Esri', mz:19 },
  pale:     { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr:'&copy; OSM &copy; CARTO', mz:20 },
  topo:     { url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', attr:'&copy; OpenTopoMap', mz:17 },
};

// ═══════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════
const app = {
  map:null, tileLayer:null, graph:new RoadGraph(), kalman:new GPSKalman(), sd:new StationaryDetector(),
  state:'INIT', filteredPos:null, userMarker:null, userCircle:null, pathLine:null,
  walkedLine:null, walkedCoords:[], junctionMarkers:[], nextMarker:null,
  currentIntersection:null, targetIntersection:null, currentSegment:null, cameFromNode:null,
  junctionCount:0, totalDist:0, startTime:null, timerInterval:null, watchId:null,
  simMode:false, simInterval:null, manualMode:false, segmentWalkedDist:0, lastArrivalTime:0,
};

function initMap(lat,lon) {
  app.map = L.map('map',{center:[lat,lon],zoom:17,zoomControl:false,attributionControl:true});
  setStyle('standard');
  L.control.zoom({position:'topright'}).addTo(app.map);
  const icon = L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#53d8fb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 16px rgba(83,216,251,0.6)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
  app.userMarker = L.marker([lat,lon],{icon,zIndexOffset:1000}).addTo(app.map);
  app.userCircle = L.circle([lat,lon],{radius:30,color:'rgba(83,216,251,0.35)',fillColor:'rgba(83,216,251,0.1)',weight:1}).addTo(app.map);
  app.walkedLine = L.polyline([],{color:'#53d8fb',weight:4,opacity:0.7,dashArray:'6,4'}).addTo(app.map);
}
function setStyle(k) {
  const t=TILES[k]; if(!t) return;
  if(app.tileLayer) app.map.removeLayer(app.tileLayer);
  app.tileLayer=L.tileLayer(t.url,{attribution:t.attr,maxZoom:t.mz}).addTo(app.map);
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('active',b.dataset.style===k));
}

function updateGPS(acc) {
  const el=document.getElementById('gps-info'); el.classList.remove('hidden');
  document.getElementById('gps-acc-text').textContent=`GPS: ±${Math.round(acc)}m`;
  const dot=document.getElementById('gps-dot');
  dot.style.background = acc<=10?'#45b97c':acc<=25?'#ffc857':acc<=50?'#e88b3a':'#e94560';
}

async function fetchRoads(lat,lon) {
  showToast('道路データを取得中...');
  const q=`[out:json][timeout:25];(way(around:800,${lat},${lon})["highway"~"^(residential|tertiary|secondary|primary|unclassified|living_street|pedestrian|footway|path|steps|service|trunk|cycleway)$"];);(._;>;);out body;`;
  try {
    const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    if(!r.ok) throw 0; const d=await r.json(); app.graph.loadOverpass(d);
    if(app.graph.intersections.size<3){showToast('交差点が少ないです');return false;}
    for(const nid of app.graph.intersections){
      const n=app.graph.nodes.get(nid); if(!n) continue;
      if((app.graph.adj.get(nid)?.size||0)<3) continue;
      const ic=L.divIcon({className:'',html:'<div style="width:6px;height:6px;border-radius:50%;background:rgba(233,69,96,0.35);border:1px solid rgba(233,69,96,0.5)"></div>',iconSize:[6,6],iconAnchor:[3,3]});
      app.junctionMarkers.push(L.marker([n.lat,n.lon],{icon:ic,interactive:false}).addTo(app.map));
    }
    showToast(`${app.graph.intersections.size} 個の交差点を検出`); return true;
  } catch(e){ showToast('道路データの取得に失敗'); return false; }
}

async function startWalk() {
  const btn=document.getElementById('btn-start'); btn.textContent='現在地を取得中...'; btn.disabled=true;

  // ── Re-acquire fresh GPS fix every time (skip in manual/sim mode) ──
  if (!app.simMode && !app.manualMode) {
    try {
      const freshPos = await new Promise((res, rej) => {
        let best=null, bestAcc=9999, att=0;
        const wid = navigator.geolocation.watchPosition(p => {
          att++; const acc=p.coords.accuracy;
          btn.textContent=`GPS取得中... ±${Math.round(acc)}m`;
          if(acc<bestAcc){bestAcc=acc;best=p;}
          if(acc<=30||att>=6){navigator.geolocation.clearWatch(wid);res(best||p);}
        }, err=>{navigator.geolocation.clearWatch(wid);rej(err);},
        {enableHighAccuracy:true,maximumAge:0,timeout:15000});
        setTimeout(()=>{navigator.geolocation.clearWatch(wid);if(best)res(best);else rej(new Error('timeout'));},16000);
      });

      const lat=freshPos.coords.latitude, lon=freshPos.coords.longitude, acc=freshPos.coords.accuracy;

      // Reset Kalman filter with fresh reading
      app.kalman = new GPSKalman();
      app.kalman.update(lat, lon, acc, Date.now());
      app.filteredPos = {lat, lon};
      app.sd = new StationaryDetector();

      // Update map view and marker
      app.userMarker.setLatLng([lat, lon]);
      app.userCircle.setLatLng([lat, lon]);
      app.userCircle.setRadius(Math.max(acc, 8));
      app.map.setView([lat, lon], 17);
      updateGPS(acc);
      showToast(`現在地を取得 (精度: ±${Math.round(acc)}m)`);
    } catch(e) {
      console.warn('Fresh GPS failed:', e);
      if(!app.filteredPos){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;showToast('位置情報を取得できません');return;}
      showToast('最新の位置を使用します');
    }
  }

  if(!app.filteredPos){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;return;}
  btn.textContent='道路データ取得中...';

  // Reset graph for fresh data at current location
  app.graph = new RoadGraph();
  const ok=await fetchRoads(app.filteredPos.lat,app.filteredPos.lon);
  if(!ok){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;return;}
  app.state='IDLE'; btn.style.display='none';
  document.getElementById('btn-stop').style.display='';
  document.getElementById('stats-row').style.display='';
  document.getElementById('direction-banner').classList.remove('hidden');
  app.startTime=Date.now(); app.timerInterval=setInterval(updateTimer,1000);
  // Reset walked data
  app.walkedCoords=[]; app.walkedLine.setLatLngs([]); app.totalDist=0; app.junctionCount=0;
  document.getElementById('stat-dist').textContent='0';
  document.getElementById('stat-junctions').textContent='0';

  const n=app.graph.nearest(app.filteredPos.lat,app.filteredPos.lon);
  if(!n){showToast('近くに交差点がありません');return;}
  app.currentIntersection=n; app.lastArrivalTime=Date.now(); app.segmentWalkedDist=0;
  pickNext();
}

function pickNext() {
  const segs=app.graph.segsFrom(app.currentIntersection);
  let cands=segs.filter(s=>s.to!==app.cameFromNode); if(!cands.length) cands=segs;
  let good=cands.filter(s=>s.dist>20); if(good.length) cands=good;
  if(!cands.length){showToast('行き止まり！');stopWalk();return;}

  app.state='PICKING';
  const ov=document.getElementById('roulette-overlay'),de=document.getElementById('roulette-dir'),ne=document.getElementById('roulette-name');
  ov.classList.add('active');
  let tick=0; const mx=15+Math.floor(Math.random()*8);
  const iv=setInterval(()=>{
    const c=cands[tick%cands.length],sn=app.graph.nodes.get(c.from),np=c.coords.length>1?c.coords[1]:app.graph.nodes.get(c.to);
    if(sn&&np){const b=bearing(sn.lat,sn.lon,np.lat,np.lon),d=bearingToDir(b);de.textContent=d.arrow;de.style.color=tick>=mx-3?'var(--accent3)':'var(--text)';ne.textContent=d.name+' ('+c.dist+'m)';}
    tick++;
    if(tick>=mx){clearInterval(iv);const ch=cands[tick%cands.length];setTimeout(()=>{ov.classList.remove('active');navSeg(ch);},800);}
  },80+tick*5);
}

function navSeg(seg) {
  app.state='WALKING'; app.currentSegment=seg; app.cameFromNode=app.currentIntersection;
  app.targetIntersection=seg.to; app.junctionCount++; app.segmentWalkedDist=0; app.lastArrivalTime=Date.now();
  document.getElementById('stat-junctions').textContent=app.junctionCount;
  if(app.pathLine) app.map.removeLayer(app.pathLine);
  app.pathLine=L.polyline(seg.coords.map(c=>[c.lat,c.lon]),{color:'#ffc857',weight:5,opacity:0.8,dashArray:'10,6'}).addTo(app.map);
  if(app.nextMarker) app.map.removeLayer(app.nextMarker);
  const tn=app.graph.nodes.get(seg.to);
  if(tn){const ic=L.divIcon({className:'',html:'<div class="junction-next"></div>',iconSize:[20,20],iconAnchor:[10,10]});app.nextMarker=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(app.map);}
  updateBanner();
  if(app.simMode || app.manualMode) startSim(seg);
}

function updateBanner() {
  if(!app.currentSegment||!app.filteredPos) return;
  const t=app.graph.nodes.get(app.targetIntersection); if(!t) return;
  const dist=haversine(app.filteredPos.lat,app.filteredPos.lon,t.lat,t.lon);
  const d=bearingToDir(bearing(app.filteredPos.lat,app.filteredPos.lon,t.lat,t.lon));
  document.getElementById('dir-main').textContent=d.arrow+' '+d.name;
  document.getElementById('dir-main').style.color='var(--accent3)';
  document.getElementById('dir-sub').textContent=`次の交差点まで ${Math.round(dist)}m`;
}

// ═══════════════════════════════════════════════════════════
//  GPS UPDATE — Kalman + Stationary Detection
// ═══════════════════════════════════════════════════════════
function onPos(rawLat, rawLon, accuracy) {
  const now = Date.now();

  // ── Simulation / Manual bypass ──
  if (app.simMode || app.manualMode) {
    app.filteredPos = { lat:rawLat, lon:rawLon };
    app.userMarker.setLatLng([rawLat,rawLon]); app.userCircle.setLatLng([rawLat,rawLon]); app.userCircle.setRadius(5);
    const last=app.walkedCoords[app.walkedCoords.length-1];
    if(last){const d=haversine(last[0],last[1],rawLat,rawLon);if(d>1){app.totalDist+=d;app.segmentWalkedDist+=d;document.getElementById('stat-dist').textContent=Math.round(app.totalDist);app.walkedCoords.push([rawLat,rawLon]);app.walkedLine.setLatLngs(app.walkedCoords);}}
    else app.walkedCoords.push([rawLat,rawLon]);
    if(app.state==='WALKING'){updateBanner();checkArr(rawLat,rawLon,now,true);app.map.panTo([rawLat,rawLon],{animate:true,duration:0.3});}
    return;
  }

  // ── Real GPS ──
  accuracy = accuracy || 100;
  updateGPS(accuracy);

  // Drop very bad readings
  if (accuracy > 80) return;

  // Kalman filter
  const f = app.kalman.update(rawLat, rawLon, accuracy, now);
  app.filteredPos = { lat:f.lat, lon:f.lon };
  app.userMarker.setLatLng([f.lat, f.lon]);
  app.userCircle.setLatLng([f.lat, f.lon]);
  app.userCircle.setRadius(Math.max(accuracy, 8));

  // Stationary detection
  app.sd.add(f.lat, f.lon, now);
  const moving = app.sd.isMoving();

  // Distance: only when moving, and step must be 2-30m (reasonable walking)
  const last = app.walkedCoords[app.walkedCoords.length-1];
  if (moving && last) {
    const d = haversine(last[0], last[1], f.lat, f.lon);
    if (d > 2 && d < 30) {
      app.totalDist += d;
      app.segmentWalkedDist += d;
      document.getElementById('stat-dist').textContent = Math.round(app.totalDist);
      app.walkedCoords.push([f.lat, f.lon]);
      app.walkedLine.setLatLngs(app.walkedCoords);
    }
  } else if (!last) {
    app.walkedCoords.push([f.lat, f.lon]);
  }

  if (app.state === 'WALKING') {
    updateBanner();
    checkArr(f.lat, f.lon, now, moving);
    app.map.panTo([f.lat, f.lon], { animate:true, duration:0.5 });
  }
}

function checkArr(lat, lon, now, moving) {
  const t = app.graph.nodes.get(app.targetIntersection); if(!t) return;
  const dist = haversine(lat, lon, t.lat, t.lon);
  const segLen = app.currentSegment ? app.currentSegment.dist : 999;
  const cooldown = now - app.lastArrivalTime > 8000;     // 8s cooldown
  const walked = app.segmentWalkedDist > segLen * 0.4 || segLen < 30;

  if (dist < 25 && cooldown && walked && moving) {
    app.state = 'ARRIVING';
    showToast('🎯 交差点に到着！');
    if(app.pathLine) app.map.removeLayer(app.pathLine);
    if(app.nextMarker) app.map.removeLayer(app.nextMarker);
    app.currentIntersection = app.targetIntersection;
    app.lastArrivalTime = now;
    setTimeout(pickNext, 600);
  }
}

// ── Simulation ──
function startSim(seg) {
  if(app.simInterval) clearInterval(app.simInterval);
  let idx=0; const coords=seg.coords;
  app.simInterval=setInterval(()=>{
    idx++; if(idx>=coords.length){clearInterval(app.simInterval);onPos(coords[coords.length-1].lat,coords[coords.length-1].lon);return;}
    const fr=coords[idx-1],to=coords[idx]; let s=0;
    const mi=setInterval(()=>{s++;const t=s/5;onPos(fr.lat+(to.lat-fr.lat)*t,fr.lon+(to.lon-fr.lon)*t);if(s>=5)clearInterval(mi);},6);
  },120);
}

function stopWalk() {
  app.state='IDLE'; if(app.timerInterval)clearInterval(app.timerInterval); if(app.simInterval)clearInterval(app.simInterval);
  if(app.pathLine)app.map.removeLayer(app.pathLine); if(app.nextMarker)app.map.removeLayer(app.nextMarker);
  // Clean up junction markers
  app.junctionMarkers.forEach(m=>app.map.removeLayer(m)); app.junctionMarkers=[];
  app.cameFromNode=null; app.currentSegment=null;
  document.getElementById('direction-banner').classList.add('hidden');
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('stats-row').style.display='none';
  const btn=document.getElementById('btn-start'); btn.style.display=''; btn.disabled=false; btn.textContent='🎲 ランダム散歩 開始';
  if(app.manualMode) document.getElementById('tap-hint').style.display='';
  showToast(`散歩完了！ ${Math.round(app.totalDist)}m / ${app.junctionCount}交差点`);
}
function updateTimer() {
  if(!app.startTime) return;
  const e=Math.floor((Date.now()-app.startTime)/1000),m=Math.floor(e/60),s=e%60;
  document.getElementById('stat-time').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}
function showToast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════════════════
//  BOOT — with manual fallback
// ═══════════════════════════════════════════════════════════
function initManualMode(defaultLat, defaultLon) {
  app.manualMode = true;
  app.filteredPos = { lat: defaultLat, lon: defaultLon };
  initMap(defaultLat, defaultLon);
  app.map.setZoom(16);
  document.getElementById('manual-badge').style.display = '';
  document.getElementById('tap-hint').style.display = '';
  document.getElementById('loading-screen').classList.add('hidden');
  app.state = 'LOADED';

  // Tap map to set position
  app.map.on('click', function(e) {
    const { lat, lng } = e.latlng;
    app.filteredPos = { lat, lon: lng };
    app.userMarker.setLatLng([lat, lng]);
    app.userCircle.setLatLng([lat, lng]);
    app.userCircle.setRadius(10);
    app.map.panTo([lat, lng]);
    document.getElementById('tap-hint').style.display = 'none';
    showToast(`📍 現在地を設定: ${lat.toFixed(5)}, ${lng.toFixed(5)}`);
  });
}

async function boot() {
  const le = document.getElementById('loading-screen');
  const lt = document.getElementById('loading-text');

  // 1. Check: is Geolocation API available at all?
  if (!('geolocation' in navigator)) {
    lt.innerHTML = 'このブラウザはGeolocation APIに非対応です';
    showManualFallback(le, lt, 'API_UNAVAILABLE');
    return;
  }

  // 2. Check: are we in a secure context?
  if (typeof window.isSecureContext !== 'undefined' && !window.isSecureContext) {
    lt.innerHTML = 'GPSが利用できません';
    showManualFallback(le, lt, 'NOT_SECURE');
    return;
  }

  // 3. Try to get a position
  lt.innerHTML = '位置情報を取得中...<br><span style="font-size:11px;color:#7a8ba6">GPS信号を受信中</span>';

  try {
    const pos = await new Promise((res, rej) => {
      let best = null, bestAcc = 9999, att = 0;
      const wid = navigator.geolocation.watchPosition(p => {
        att++;
        const acc = p.coords.accuracy;
        lt.innerHTML = `位置情報を取得中... (精度: ±${Math.round(acc)}m)<br><span style="font-size:11px;color:#7a8ba6">GPS信号を受信中 (${att}回目)</span>`;
        if (acc < bestAcc) { bestAcc = acc; best = p; }
        if (acc <= 30 || att >= 8) { navigator.geolocation.clearWatch(wid); res(best || p); }
      }, err => {
        navigator.geolocation.clearWatch(wid);
        rej(err);
      }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });

      setTimeout(() => {
        navigator.geolocation.clearWatch(wid);
        if (best) res(best);
        else rej(new Error('timeout'));
      }, 16000);
    });

    // Success — GPS works
    const lat = pos.coords.latitude, lon = pos.coords.longitude, acc = pos.coords.accuracy;
    app.kalman.update(lat, lon, acc, Date.now());
    app.filteredPos = { lat, lon };
    initMap(lat, lon);
    updateGPS(acc);

    app.watchId = navigator.geolocation.watchPosition(
      p => onPos(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      e => console.warn('GPS:', e),
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
    );
    le.classList.add('hidden');
    app.state = 'LOADED';
    showToast(`GPS精度: ±${Math.round(acc)}m`);

  } catch (e) {
    console.warn('Geolocation failed:', e);
    const errCode = e.code || 0;
    // code 1=PERMISSION_DENIED, 2=POSITION_UNAVAILABLE, 3=TIMEOUT
    let reason = 'UNKNOWN';
    if (errCode === 1) reason = 'PERMISSION_DENIED';
    else if (errCode === 2) reason = 'POSITION_UNAVAILABLE';
    else if (errCode === 3) reason = 'TIMEOUT';

    // Check if it smells like an iframe permissions-policy block
    // (typically returns code=1 with no user prompt)
    if (errCode === 1 && e.message && e.message.toLowerCase().includes('secure')) {
      reason = 'NOT_SECURE';
    }

    lt.innerHTML = 'GPSの取得に失敗しました';
    showManualFallback(le, lt, reason);
  }
}

function showManualFallback(loadingEl, loadingText, reason) {
  let reasonHTML = '';
  switch (reason) {
    case 'NOT_SECURE':
      reasonHTML = `
        <b>原因:</b> HTTPSでないページではGPSが使えません<br>
        <b>解決策:</b><br>
        ① HTMLファイルをGitHub Pagesなどにアップロード<br>
        ② または下の「手動モード」でスタート地点を地図上でタップして設定
      `;
      break;
    case 'PERMISSION_DENIED':
      reasonHTML = `
        <b>原因:</b> 位置情報の権限がブロックされています<br>
        <b>解決策:</b><br>
        ① このページがiframe内の場合 → <b>ファイルをダウンロードしてHTTPSで開く</b><br>
        ② Chrome設定 → サイトの設定 → 位置情報 → 許可<br>
        ③ または下の「手動モード」で地図タップで開始
      `;
      break;
    case 'TIMEOUT':
    case 'POSITION_UNAVAILABLE':
      reasonHTML = `
        <b>原因:</b> GPS信号を取得できませんでした<br>
        <b>解決策:</b><br>
        ① 端末の位置情報(GPS)がONか確認<br>
        ② 屋外で再試行（屋内ではGPS精度が低下）<br>
        ③ または下の「手動モード」で開始
      `;
      break;
    default:
      reasonHTML = `
        <b>原因:</b> 位置情報が利用できません<br>
        ① 手動モードで地図上をタップして開始地点を設定できます
      `;
  }

  const reasonEl = document.createElement('div');
  reasonEl.className = 'loading-reason';
  reasonEl.innerHTML = reasonHTML;
  loadingText.parentElement.appendChild(reasonEl);

  const btn = document.createElement('button');
  btn.className = 'loading-btn';
  btn.textContent = '📍 手動モードで開始';
  btn.addEventListener('click', () => {
    // Default: Shinagawa area
    initManualMode(35.6284, 139.7387);
  });
  loadingText.parentElement.appendChild(btn);

  const retryBtn = document.createElement('button');
  retryBtn.className = 'loading-btn';
  retryBtn.style.background = 'transparent';
  retryBtn.style.color = 'var(--text-dim)';
  retryBtn.style.border = '1.5px solid var(--card-border)';
  retryBtn.style.marginTop = '8px';
  retryBtn.textContent = '🔄 GPSを再試行';
  retryBtn.addEventListener('click', () => {
    // Clean up added elements and retry
    reasonEl.remove(); btn.remove(); retryBtn.remove();
    loadingText.innerHTML = '位置情報を再取得中...';
    boot();
  });
  loadingText.parentElement.appendChild(retryBtn);
}

// Events
document.getElementById('btn-start').addEventListener('click',async()=>{
  if(!app.watchId&&!app.simMode&&!app.manualMode){app.simMode=true;document.getElementById('sim-badge').style.display='';}
  // Hide tap hint if in manual mode
  document.getElementById('tap-hint').style.display='none';
  await startWalk();
});
document.getElementById('btn-stop').addEventListener('click',stopWalk);
document.querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',()=>setStyle(b.dataset.style)));

boot();
</script>
</body>
</html>
