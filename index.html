<style>
:root{--bg:#1a1a2e;--card:#16213e;--card2:#1c2a4a;--border:#0f3460;--accent:#e94560;--accent2:#53d8fb;--accent3:#ffc857;--text:#e8e8e8;--dim:#7a8ba6;--ok:#45b97c;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP','DM Mono',sans-serif;background:var(--bg);color:var(--text);height:100dvh;width:100vw;overflow:hidden;}
#map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;}

/* Direction banner */
#dir-banner{position:absolute;top:0;left:0;right:0;z-index:800;padding:10px 16px;padding-top:max(env(safe-area-inset-top,10px),10px);background:linear-gradient(180deg,rgba(26,26,46,.95),rgba(26,26,46,.6) 85%,transparent);text-align:center;pointer-events:none;transition:opacity .3s;}
#dir-banner.hide{opacity:0;}
.db-label{font-size:10px;letter-spacing:.15em;color:var(--dim);font-family:'DM Mono',monospace;}
.db-main{font-size:30px;font-weight:900;}
.db-sub{font-size:12px;color:var(--accent2);margin-top:2px;font-family:'DM Mono',monospace;}

/* GPS badge */
#gps-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:799;pointer-events:none;font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(22,33,62,.9);border:1px solid var(--border);display:none;}
.gd{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px;}

/* Bottom bar */
#bottom{position:absolute;bottom:0;left:0;right:0;z-index:900;background:rgba(26,26,46,.97);border-top:1px solid rgba(255,255,255,.05);padding-bottom:calc(max(env(safe-area-inset-bottom,8px),8px) + 4px);}
#stats{display:flex;gap:14px;justify-content:center;padding:8px 0;display:none;}
.si{text-align:center;min-width:60px;}
.sv{font-family:'DM Mono',monospace;font-size:18px;color:var(--accent2);}
.sl{font-size:9px;color:var(--dim);letter-spacing:.08em;}
#btns{display:flex;gap:8px;justify-content:center;align-items:center;padding:6px 16px;}
.btn{font-family:'Noto Sans JP',sans-serif;font-weight:900;border:none;border-radius:50px;cursor:pointer;transition:all .15s;}
.btn:active{transform:scale(.93);}
#btn-start{font-size:15px;padding:12px 36px;background:var(--accent);color:#fff;box-shadow:0 3px 16px rgba(233,69,96,.35);}
#btn-stop{font-size:13px;padding:10px 28px;background:transparent;color:var(--accent);border:2px solid var(--accent);display:none;}
#btn-voice{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--dim);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#btn-voice.on{background:var(--accent3);color:var(--bg);border-color:var(--accent3);}
#btn-history{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--dim);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Map style row */
#styles{display:flex;gap:5px;justify-content:center;padding:5px 8px;}
.sbtn{font-size:10px;font-weight:700;padding:4px 10px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);color:var(--dim);cursor:pointer;}
.sbtn.on{background:var(--accent2);color:var(--bg);border-color:var(--accent2);}

/* Toast */
#toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:1500;background:var(--card);border:1px solid var(--border);padding:8px 18px;border-radius:20px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{opacity:1;}

/* Badges */
.badge{position:absolute;top:8px;z-index:810;padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;display:none;}
#badge-mode{right:8px;background:var(--accent3);color:var(--bg);}
#badge-bg{left:8px;background:rgba(69,185,124,.2);color:var(--ok);border:1px solid rgba(69,185,124,.3);}

/* Loading */
#loading{position:absolute;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s;}
#loading.gone{opacity:0;pointer-events:none;}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#load-text{font-size:13px;color:var(--dim);text-align:center;padding:0 20px;line-height:1.7;}
.load-reason{margin-top:10px;padding:10px 16px;border-radius:10px;background:rgba(233,69,96,.08);border:1px solid rgba(233,69,96,.25);font-size:11px;color:#bbb;line-height:1.7;max-width:300px;text-align:left;}
.load-reason b{color:var(--accent);}
.lbtn{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;padding:10px 28px;border:none;border-radius:50px;cursor:pointer;margin-top:10px;}

/* History panel */
#history-panel{position:absolute;inset:0;z-index:1800;background:var(--bg);transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#history-panel.open{transform:translateX(0);}
.hp-header{position:sticky;top:0;background:var(--bg);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1;}
.hp-title{font-size:18px;font-weight:900;}
.hp-close{font-size:24px;color:var(--dim);cursor:pointer;padding:4px 8px;}
.hp-empty{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;}
.hcard{margin:10px 12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.hcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hcard-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent2);}
.hcard-del{font-size:16px;color:var(--dim);cursor:pointer;padding:2px 6px;}
.hcard-stats{display:flex;gap:16px;font-size:13px;margin-bottom:8px;}
.hcard-stats span{color:var(--accent3);}
.hcard-memo{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:36px;margin-top:6px;}
.hcard-memo::placeholder{color:var(--dim);}
.hcard-btn-row{display:flex;gap:8px;margin-top:8px;}
.hcard-btn{font-size:11px;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--dim);cursor:pointer;}
.hcard-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* Tap hint */
#tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:810;pointer-events:none;display:none;}
.tap-inner{background:rgba(22,33,62,.92);border:1.5px solid var(--accent2);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:700;color:var(--accent2);white-space:nowrap;animation:tp 2s ease infinite;}
@keyframes tp{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}

.leaflet-control-attribution{font-size:8px!important;}
.jn{width:18px;height:18px;border-radius:50%;background:var(--accent3);border:2px solid #fff;box-shadow:0 0 10px rgba(255,200,87,.5);}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div id="load-text">位置情報を取得中...</div></div>

<div id="dir-banner" class="hide">
  <div class="db-label">NEXT DIRECTION</div>

    <div class="si"><div class="sv" id="s-dist">0</div><div class="sl">m</div></div>

  </div>

    <div id="btn-voice" title="音声">🔇</div>

  </div>
  <div id="styles">

    <div class="sbtn" data-s="sat">航空写真</div>
    <div class="sbtn" data-s="pale">淡色</div>
    <div class="sbtn" data-s="topo">地形</div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════
//  UTILITIES
// ═════════════════════════════════════════════════════
const {sin,cos,atan2,sqrt,PI,floor,round,min,max,random}=Math;
const toR=d=>d*PI/180;
function hav(a1,o1,a2,o2){const R=6371e3,dA=toR(a2-a1),dO=toR(o2-o1),a=sin(dA/2)**2+cos(toR(a1))*cos(toR(a2))*sin(dO/2)**2;return R*2*atan2(sqrt(a),sqrt(1-a));}
function bear(a1,o1,a2,o2){const dO=toR(o2-o1),y=sin(dO)*cos(toR(a2)),x=cos(toR(a1))*sin(toR(a2))-sin(toR(a1))*cos(toR(a2))*cos(dO);return(atan2(y,x)*180/PI+360)%360;}
const DA=['↑','↗','→','↘','↓','↙','←','↖'],DN=['北','北東','東','南東','南','南西','西','北西'],DE=['North','NE','East','SE','South','SW','West','NW'];
function bDir(b){const i=round(b/45)%8;return{a:DA[i],n:DN[i],e:DE[i],i};}

// Distance from point to polyline (min dist to any segment)
function distToPolyline(lat,lon,coords){
  if(!coords||coords.length<2)return Infinity;
  let md=Infinity;
  for(let i=0;i<coords.length-1;i++){
    const a=coords[i],b=coords[i+1];
    md=min(md,distToSeg(lat,lon,a.lat,a.lon,b.lat,b.lon));
  }
  return md;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2===0)return hav(px,py,ax,ay);
  let t=((px-ax)*dx+(py-ay)*dy)/l2;
  t=max(0,min(1,t));
  return hav(px,py,ax+t*dx,ay+t*dy);
}

// ═════════════════════════════════════════════════════
//  VOICE GUIDE
// ═════════════════════════════════════════════════════
const voice={
  on:false,mode:'off',syn:window.speechSynthesis||null,jaV:null,enV:null,ctx:null,
  init(){if(!this.syn)return;const v=this.syn.getVoices();this.jaV=v.find(x=>x.lang.startsWith('ja'))||null;this.enV=v.find(x=>x.lang.startsWith('en')&&x.localService)||v.find(x=>x.lang.startsWith('en'))||null;if(this.syn)this.syn.onvoiceschanged=()=>{const v2=this.syn.getVoices();this.jaV=v2.find(x=>x.lang.startsWith('ja'))||null;this.enV=v2.find(x=>x.lang.startsWith('en')&&x.localService)||v2.find(x=>x.lang.startsWith('en'))||null;};},
  enable(){this.on=true;this.init();this.mode=this.jaV?'ja':this.enV?'en':(this.syn&&this.syn.getVoices().length)?'ja':'beep';this.say('音声ガイドオン','Voice on',null);return this.mode;},
  disable(){this.on=false;this.mode='off';if(this.syn)this.syn.cancel();},
  say(ja,en,bp){
    if(!this.on)return;
    if((this.mode==='ja'||this.mode==='en')&&this.syn){
      if(this.syn.paused)this.syn.resume();this.syn.cancel();
      const u=new SpeechSynthesisUtterance(this.mode==='ja'?ja:en);
      u.lang=this.mode==='ja'?'ja-JP':'en-US';
      const v=this.mode==='ja'?this.jaV:this.enV;if(v)u.voice=v;u.rate=1.1;u.volume=1;
      this.syn.speak(u);
      const ri=setInterval(()=>{if(this.syn.paused)this.syn.resume();if(!this.syn.speaking)clearInterval(ri);},300);
      setTimeout(()=>clearInterval(ri),10000);
    }else if(this.mode==='beep')this.beep(bp||'info');
  },
  beep(p){try{if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();const c=this.ctx,n=c.currentTime,b=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.3,n+s);g.gain.exponentialRampToValueAtTime(.01,n+s+d);o.start(n+s);o.stop(n+s+d);};({direction:()=>{b(523,0,.15);b(659,.15,.15);b(784,.3,.3)},arrived:()=>{b(523,0,.12);b(659,.12,.12);b(784,.24,.12);b(1047,.36,.4)},approaching:()=>{b(880,0,.1);b(880,.2,.1);b(880,.4,.1)},start:()=>{b(440,0,.2);b(660,.25,.2);b(880,.5,.3)},stop:()=>{b(880,0,.2);b(660,.2,.2);b(440,.4,.4)},info:()=>{b(660,0,.15);b(660,.2,.15)}}[p]||function(){b(660,0,.15)})();}catch(e){}},
  dir(n,e,m,i){this.say(`${n}へ進んでください。${m}メートル先。`,`Go ${e}. ${m} meters.`,'direction');},
  approach(m){this.say(`まもなく交差点。あと${m}メートル。`,`Approaching. ${m} meters.`,'approaching');},
  arrived(){this.say('交差点に到着。','Arrived.','arrived');},
  reroute(){this.say('ルートを再計算します。','Recalculating.','approaching');},
  start(){this.say('散歩を開始します。','Starting walk.','start');},
  stop(m,j){this.say(`散歩終了。${m}メートル、${j}交差点。`,`Done. ${m}m, ${j} intersections.`,'stop');}
};
voice.init();

// ═════════════════════════════════════════════════════
//  BACKGROUND KEEP-ALIVE
// ═════════════════════════════════════════════════════
const bg={
  wl:null,au:null,ctx:null,osc:null,active:false,notif:false,
  async acquire(){
    if(this.active)return;this.active=true;
    if('wakeLock' in navigator)try{this.wl=await navigator.wakeLock.request('screen');$('badge-bg').style.display='';this.wl.addEventListener('release',()=>{$('badge-bg').textContent='🎵 BG';});}catch(e){}
    document.addEventListener('visibilitychange',this._vc=async()=>{if(document.visibilityState==='visible'&&this.active&&'wakeLock' in navigator)try{this.wl=await navigator.wakeLock.request('screen');$('badge-bg').style.display='';$('badge-bg').textContent='🔒 画面維持';}catch(e){}if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();});
    try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.osc=this.ctx.createOscillator();this.osc.frequency.value=1;const g=this.ctx.createGain();g.gain.value=.01;const sd=this.ctx.createMediaStreamDestination();this.osc.connect(g);g.connect(sd);const sg=this.ctx.createGain();sg.gain.value=.001;this.osc.connect(sg);sg.connect(this.ctx.destination);this.osc.start();this.au=document.createElement('audio');this.au.srcObject=sd.stream;this.au.loop=true;this.au.volume=.01;await this.au.play();}catch(e){}
    if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:'ランダム散歩',artist:'散歩中...'});try{navigator.mediaSession.setActionHandler('pause',()=>{navigator.mediaSession.playbackState='playing';});}catch(e){}}
    if('Notification' in window&&Notification.permission==='default')try{this.notif=(await Notification.requestPermission())==='granted';}catch(e){}
    else if('Notification' in window)this.notif=Notification.permission==='granted';
  },
  release(){
    this.active=false;
    if(this.wl)try{this.wl.release();}catch(e){}this.wl=null;
    if(this.au){this.au.pause();this.au.srcObject=null;this.au=null;}
    if(this.osc)try{this.osc.stop();}catch(e){}this.osc=null;
    if(this.ctx)try{this.ctx.close();}catch(e){}this.ctx=null;
    if(this._vc)document.removeEventListener('visibilitychange',this._vc);
    if('mediaSession' in navigator)try{navigator.mediaSession.metadata=null;}catch(e){}
    $('badge-bg').style.display='none';
  },
  ms(dir,dist){if('mediaSession' in navigator)try{navigator.mediaSession.metadata=new MediaMetadata({title:`${dir} → ${dist}m`,artist:'ランダム散歩 🎲'});}catch(e){}},
  notify(t,b,tag){if(!this.notif)return;try{const n=new Notification(t,{body:b,tag:tag||'w',vibrate:[200,100,200],silent:false});setTimeout(()=>n.close(),6000);}catch(e){}},
  vib(p){if('vibrate' in navigator)try{navigator.vibrate(p);}catch(e){}}
};

// ═════════════════════════════════════════════════════
//  GPS KALMAN + STATIONARY
// ═════════════════════════════════════════════════════
class Kalman{constructor(){this.lat=null;this.lon=null;this.v=-1;this.t=0;}
  upd(lat,lon,acc,ts){acc=max(acc,3);if(this.v<0){this.lat=lat;this.lon=lon;this.v=acc*acc;this.t=ts;return{lat,lon};}const dt=(ts-this.t)/1000;if(dt>0){this.v+=dt*2.25;this.t=ts;}const K=this.v/(this.v+acc*acc);this.lat+=K*(lat-this.lat);this.lon+=K*(lon-this.lon);this.v*=(1-K);return{lat:this.lat,lon:this.lon};}}
class StatDet{constructor(){this.b=[];this.mx=15;}add(lat,lon,t){this.b.push({lat,lon,t});if(this.b.length>this.mx)this.b.shift();}
  mov(){if(this.b.length<4)return false;const f=this.b[0],l=this.b[this.b.length-1],d=hav(f.lat,f.lon,l.lat,l.lon),dt=(l.t-f.t)/1000;return dt>2&&(d/dt)>.8&&d>5;}}

// ═════════════════════════════════════════════════════
//  ROAD GRAPH
// ═════════════════════════════════════════════════════
class Graph{
  constructor(){this.N=new Map();this.A=new Map();this.WN=new Map();this.NW=new Map();this.IX=new Set();this.S=[];}
  load(data){
    for(const e of data.elements||[]){if(e.type==='node')this.N.set(e.id,{lat:e.lat,lon:e.lon});}
    for(const e of data.elements||[]){if(e.type!=='way'||!e.nodes)continue;const ns=e.nodes;this.WN.set(e.id,ns);for(let i=0;i<ns.length;i++){const n=ns[i];if(!this.NW.has(n))this.NW.set(n,new Set());this.NW.get(n).add(e.id);if(!this.A.has(n))this.A.set(n,new Set());if(i>0){this.A.get(n).add(ns[i-1]);if(!this.A.has(ns[i-1]))this.A.set(ns[i-1],new Set());this.A.get(ns[i-1]).add(n);}}}
    for(const[n,nb]of this.A)if(nb.size>=3||nb.size===1)this.IX.add(n);
    for(const[n,w]of this.NW)if(w.size>=2&&this.A.has(n))this.IX.add(n);
    const vis=new Set();
    for(const si of this.IX){const sn=this.N.get(si);if(!sn)continue;const nb=this.A.get(si);if(!nb)continue;
      for(const nx of nb){if(vis.has(`${si}-${nx}`))continue;const p=[si];let c=nx,pv=si,d=0;
        while(c&&!this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)d+=hav(pn.lat,pn.lon,cn.lat,cn.lon);const a=this.A.get(c);let n2=null;for(const x of a)if(x!==pv){n2=x;break;}pv=c;c=n2;}
        if(c&&this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)d+=hav(pn.lat,pn.lon,cn.lat,cn.lon);vis.add(`${si}-${p[1]}`);vis.add(`${c}-${p[p.length-2]}`);this.S.push({f:si,t:c,ids:p,co:p.map(id=>this.N.get(id)).filter(Boolean),d:round(d)});}}}
  }
  near(lat,lon){let b=null,bd=Infinity;for(const n of this.IX){const nd=this.N.get(n);if(!nd)continue;const d=hav(lat,lon,nd.lat,nd.lon);if(d<bd){bd=d;b=n;}}return b;}
  from(id){return this.S.filter(s=>s.f===id||s.t===id).map(s=>s.t===id?{f:s.t,t:s.f,ids:[...s.ids].reverse(),co:[...s.co].reverse(),d:s.d}:s);}
}

const hist={
  KEY:'rw_hist',
  load(){try{return JSON.parse(localStorage.getItem(this.KEY))||[];}catch(e){return[];}},
  save(arr){try{localStorage.setItem(this.KEY,JSON.stringify(arr));}catch(e){}},
  add(rec){const a=this.load();a.unshift(rec);if(a.length>50)a.length=50;this.save(a);},
  del(id){const a=this.load().filter(r=>r.id!==id);this.save(a);},
  memo(id,txt){const a=this.load();const r=a.find(x=>x.id===id);if(r){r.memo=txt;this.save(a);}},
  render(){
    const a=this.load(),el=$('hist-list');
    if(!a.length){el.innerHTML='<div class="hp-empty">まだ散歩の記録がありません<br>散歩を終了すると自動で記録されます</div>';return;}
    el.innerHTML=a.map(r=>`<div class="hcard" data-id="${r.id}">
      <div class="hcard-top"><span class="hcard-date">${r.date}</span><span class="hcard-del" data-del="${r.id}">🗑</span></div>
      <div class="hcard-stats"><span>${r.dist}m</span> ・ <span>${r.junc}交差点</span> ・ ${r.dur}</div>
      <textarea class="hcard-memo" data-memo="${r.id}" placeholder="メモを追加...">${r.memo||''}</textarea>
      <div class="hcard-btn-row"><div class="hcard-btn" data-show="${r.id}">🗺 地図で表示</div></div>
    </div>`).join('');
    // Event delegation
    el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(confirm('この記録を削除しますか？')){hist.del(b.dataset.del);hist.render();}});
    el.querySelectorAll('[data-memo]').forEach(t=>t.onblur=()=>hist.memo(t.dataset.memo,t.value));
    el.querySelectorAll('[data-show]').forEach(b=>b.onclick=()=>{const r=this.load().find(x=>x.id===b.dataset.show);if(r&&r.path&&r.path.length&&app.map){$('history-panel').classList.remove('open');const ll=r.path.map(p=>[p[0],p[1]]);L.polyline(ll,{color:'#e94560',weight:3,opacity:.6}).addTo(app.map);app.map.fitBounds(L.latLngBounds(ll).pad(.1));showToast('過去のルートを表示');}});
  }
};

function initMap(lat,lon){

function setSt(k){const t=T[k];if(!t)return;if(app.tl)app.map.removeLayer(app.tl);app.tl=L.tileLayer(t.u,{attribution:t.a,maxZoom:t.z}).addTo(app.map);document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('on',b.dataset.s===k));}
function updGPS(a){$('gps-badge').style.display='';$('gps-txt').textContent=`±${round(a)}m`;$('gps-dot').style.background=a<=10?'var(--ok)':a<=25?'var(--accent3)':a<=50?'#e88b3a':'var(--accent)';}

async function fetchRoads(lat,lon){
  showToast('道路データ取得中...');
  const q=`[out:json][timeout:25];(way(around:800,${lat},${lon})["highway"~"^(residential|tertiary|secondary|primary|unclassified|living_street|pedestrian|footway|path|steps|service|trunk|cycleway)$"];);(._;>;);out body;`;
  try{const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});if(!r.ok)throw 0;const d=await r.json();app.g.load(d);
    if(app.g.IX.size<3){showToast('交差点が少ない');return false;}
    for(const n of app.g.IX){const nd=app.g.N.get(n);if(!nd||(app.g.A.get(n)?.size||0)<3)continue;const ic=L.divIcon({className:'',html:'<div style="width:5px;height:5px;border-radius:50%;background:rgba(233,69,96,.3);border:1px solid rgba(233,69,96,.4)"></div>',iconSize:[5,5],iconAnchor:[2,2]});app.jm.push(L.marker([nd.lat,nd.lon],{icon:ic,interactive:false}).addTo(app.map));}
    showToast(`${app.g.IX.size} 交差点検出`);return true;
  }catch(e){showToast('道路データ取得失敗');return false;}
}

// ═════════════════════════════════════════════════════
//  START / STOP WALK
// ═════════════════════════════════════════════════════
async function startWalk(){
  const b=$('btn-start');b.textContent='取得中...';b.disabled=true;
  if(!app.sim&&!app.manual){try{
    const p=await new Promise((ok,ng)=>{let best=null,ba=9999,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;b.textContent=`GPS ±${round(a)}m`;if(a<ba){ba=a;best=p;}if(a<=30||n>=6){navigator.geolocation.clearWatch(w);ok(best||p);}},e=>{navigator.geolocation.clearWatch(w);ng(e);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(new Error('t'));},16000);});
    const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
    app.k=new Kalman();app.k.upd(lat,lon,acc,Date.now());app.fp={lat,lon};app.sd=new StatDet();
    app.um.setLatLng([lat,lon]);app.uc.setLatLng([lat,lon]);app.map.setView([lat,lon],17);updGPS(acc);
  }catch(e){if(!app.fp){b.textContent='🎲 ランダム散歩';b.disabled=false;showToast('位置取得失敗');return;}}}
  if(!app.fp){b.textContent='🎲 ランダム散歩';b.disabled=false;return;}
  b.textContent='道路取得中...';app.g=new Graph();
  if(!await fetchRoads(app.fp.lat,app.fp.lon)){b.textContent='🎲 ランダム散歩';b.disabled=false;return;}
  bg.acquire();
  app.st='WALK';b.style.display='none';$('btn-stop').style.display='';$('stats').style.display='';$('dir-banner').classList.remove('hide');
  app.t0=Date.now();app.tv=setInterval(updTime,1000);
  app.wc=[];app.wl.setLatLngs([]);app.td=0;app.jc=0;app.vis=new Set();
  app.vm.forEach(m=>app.map.removeLayer(m));app.vm=[];
  $('s-dist').textContent='0';$('s-junc').textContent='0';$('s-time').textContent='0:00';
  const n=app.g.near(app.fp.lat,app.fp.lon);
  if(!n){showToast('交差点なし');return;}
  app.ci=n;app.lat=Date.now();app.swd=0;
  voice.start();startRoute();
}

function stopWalk(){
  // Save history
  const dur=app.t0?fmtTime(floor((Date.now()-app.t0)/1000)):'0:00';
  hist.add({
    id:Date.now().toString(36)+round(random()*1e4).toString(36),
    date:new Date().toLocaleString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    dist:round(app.td),junc:app.jc,dur,
    path:app.wc.slice(0,500), // limit stored coords
    memo:''
  });

  app.st='IDLE';if(app.tv)clearInterval(app.tv);if(app.si)clearInterval(app.si);
  [app.pl,app.nm,app.npl,app.nnm].forEach(x=>{if(x)app.map.removeLayer(x);});
  app.pl=app.nm=app.npl=app.nnm=app.ns=null;
  app.jm.forEach(m=>app.map.removeLayer(m));app.jm=[];
  app.vm.forEach(m=>app.map.removeLayer(m));app.vm=[];app.vis.clear();
  app.cf=null;app.cs=null;
  $('dir-banner').classList.add('hide');$('btn-stop').style.display='none';$('stats').style.display='none';
  const b=$('btn-start');b.style.display='';b.disabled=false;b.textContent='🎲 ランダム散歩';
  if(app.manual)$('tap-hint').style.display='';
  voice.stop(round(app.td),app.jc);bg.release();
  showToast(`散歩完了！ ${round(app.td)}m / ${app.jc}交差点`);
}

// ═════════════════════════════════════════════════════
//  ROUTING — instant + 1-step lookahead
// ═════════════════════════════════════════════════════
function pickSeg(from,came){
  const segs=app.g.from(from);
  let c=segs.filter(s=>!app.vis.has(s.t));
  if(!c.length)c=segs.filter(s=>s.t!==came);
  if(!c.length)c=segs;
  let g=c.filter(s=>s.d>20);if(g.length)c=g;
  return c.length?c[floor(random()*c.length)]:null;
}

function startRoute(){
  app.vis.add(app.ci);markVis(app.ci);
  const seg=pickSeg(app.ci,app.cf);
  if(!seg){showToast('全ルート完了！');voice.say('全ての道を通りました。','All done.','stop');stopWalk();return;}
  goSeg(seg);precompute();
}

function precompute(){
  if(!app.ti){app.ns=null;return;}
  const tv=app.vis.has(app.ti);app.vis.add(app.ti);
  app.ns=pickSeg(app.ti,app.ci);
  if(!tv)app.vis.delete(app.ti);
  if(app.npl)app.map.removeLayer(app.npl);if(app.nnm)app.map.removeLayer(app.nnm);
  app.npl=null;app.nnm=null;
  if(app.ns){
    app.npl=L.polyline(app.ns.co.map(c=>[c.lat,c.lon]),{color:'#ffc857',weight:2.5,opacity:.25,dashArray:'3,8'}).addTo(app.map);
    const nn=app.g.N.get(app.ns.t);
    if(nn){const ic=L.divIcon({className:'',html:'<div style="width:12px;height:12px;border-radius:50%;background:rgba(255,200,87,.25);border:1px solid rgba(255,200,87,.4)"></div>',iconSize:[12,12],iconAnchor:[6,6]});app.nnm=L.marker([nn.lat,nn.lon],{icon:ic,interactive:false}).addTo(app.map);}
  }
}

function goSeg(seg){
  app.st='WALK';app.cs=seg;app.cf=app.ci;app.ti=seg.t;app.jc++;app.swd=0;app.lat=Date.now();app.aa=false;
  $('s-junc').textContent=app.jc;
  if(app.pl)app.map.removeLayer(app.pl);
  app.pl=L.polyline(seg.co.map(c=>[c.lat,c.lon]),{color:'#ffc857',weight:5,opacity:.8,dashArray:'10,6'}).addTo(app.map);
  if(app.nm)app.map.removeLayer(app.nm);
  const tn=app.g.N.get(seg.t);
  if(tn){const ic=L.divIcon({className:'',html:'<div class="jn"></div>',iconSize:[18,18],iconAnchor:[9,9]});app.nm=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(app.map);}
  updBanner();
  const sn=app.g.N.get(seg.f),np=seg.co.length>1?seg.co[1]:app.g.N.get(seg.t);
  if(sn&&np){const d=bDir(bear(sn.lat,sn.lon,np.lat,np.lon));voice.dir(d.n,d.e,seg.d,d.i);bg.ms(`${d.a} ${d.n}`,seg.d);bg.notify('🎲 '+d.a+' '+d.n,seg.d+'m先','d');bg.vib([100,50,100,50,200]);}
  if(app.sim||app.manual)startSim(seg);
}

function onArrival(now){
  app.vis.add(app.ti);markVis(app.ti);
  showToast('🎯 交差点に到着！');voice.arrived();bg.notify('🎯 到着！','次の方向...','a');bg.vib([100,80,100,80,300]);
  [app.pl,app.nm,app.npl,app.nnm].forEach(x=>{if(x)app.map.removeLayer(x);});
  app.pl=app.nm=app.npl=app.nnm=null;
  app.ci=app.ti;app.lat=now;
  const seg=app.ns||pickSeg(app.ci,app.cf);app.ns=null;
  if(!seg){showToast('全ルート完了！');stopWalk();return;}
  goSeg(seg);precompute();
}

function onDetour(nid,now){
  app.vis.add(nid);markVis(nid);
  showToast('🔄 ルート再計算');voice.reroute();bg.notify('🔄 再計算','','r');bg.vib([300,100,300]);
  [app.pl,app.nm,app.npl,app.nnm].forEach(x=>{if(x)app.map.removeLayer(x);});
  app.pl=app.nm=app.npl=app.nnm=null;app.ns=null;
  app.ci=nid;app.cf=null;app.lat=now;app.jc++;$('s-junc').textContent=app.jc;
  const seg=pickSeg(nid,null);if(!seg){stopWalk();return;}
  goSeg(seg);precompute();
}

function markVis(nid){const n=app.g.N.get(nid);if(!n)return;const ic=L.divIcon({className:'',html:'<div style="width:8px;height:8px;border-radius:50%;background:rgba(83,216,251,.2);border:1px solid rgba(83,216,251,.35)"></div>',iconSize:[8,8],iconAnchor:[4,4]});app.vm.push(L.marker([n.lat,n.lon],{icon:ic,interactive:false,zIndexOffset:-100}).addTo(app.map));}

function updBanner(){
  if(!app.cs||!app.fp)return;
  const t=app.g.N.get(app.ti);if(!t)return;
  const dist=hav(app.fp.lat,app.fp.lon,t.lat,t.lon);
  const d=bDir(bear(app.fp.lat,app.fp.lon,t.lat,t.lon));
  $('d-main').textContent=d.a+' '+d.n;$('d-main').style.color='var(--accent3)';
  let sub=`${round(dist)}m`;
  if(app.ns){const ns=app.g.N.get(app.ns.f),np=app.ns.co.length>1?app.ns.co[1]:app.g.N.get(app.ns.t);if(ns&&np){const d2=bDir(bear(ns.lat,ns.lon,np.lat,np.lon));sub+=` → 次 ${d2.a}${d2.n} ${app.ns.d}m`;}}
  $('d-sub').textContent=sub;
  if(!app.aa&&dist<40&&app.swd>10){app.aa=true;voice.approach(round(dist));bg.notify('⚠️ 交差点',round(dist)+'m','ap');bg.vib([200,100,200,100,200]);}
  bg.ms(`${d.a} ${d.n}`,round(dist));
}

// ═════════════════════════════════════════════════════
//  ARRIVAL DETECTION (FIXED)
// ═════════════════════════════════════════════════════
function checkArr(lat,lon,now,moving){
  if(!moving||app.st!=='WALK')return;
  if(now-app.lat<5000)return; // cooldown

  // 1. Target arrival
  const t=app.g.N.get(app.ti);
  if(t){
    const dist=hav(lat,lon,t.lat,t.lon);
    const sl=app.cs?app.cs.d:999;
    if(dist<25&&(app.swd>sl*.35||sl<30)){
      app.st='ARR';onArrival(now);return;
    }
  }

  // 2. Wrong intersection — ONLY if deviated from path
  if(app.swd<20||!app.cs)return;
  const devDist=distToPolyline(lat,lon,app.cs.co);
  if(devDist<45)return; // still near planned route — no reroute

  // Actually deviated >45m. Check if near another intersection.
  const skip=new Set([app.ci,app.ti,app.cf]);
  if(app.ns)skip.add(app.ns.t);
  for(const nid of app.g.IX){
    if(skip.has(nid))continue;
    const nd=app.g.N.get(nid);if(!nd)continue;
    if(hav(lat,lon,nd.lat,nd.lon)<25){
      app.st='ARR';onDetour(nid,now);return;
    }
  }
}

// ═════════════════════════════════════════════════════
//  GPS UPDATE
// ═════════════════════════════════════════════════════
function onPos(rlat,rlon,acc){
  const now=Date.now();
  if(app.sim||app.manual){
    app.fp={lat:rlat,lon:rlon};app.um.setLatLng([rlat,rlon]);app.uc.setLatLng([rlat,rlon]);app.uc.setRadius(5);
    const l=app.wc[app.wc.length-1];
    if(l){const d=hav(l[0],l[1],rlat,rlon);if(d>1){app.td+=d;app.swd+=d;$('s-dist').textContent=round(app.td);app.wc.push([rlat,rlon]);app.wl.setLatLngs(app.wc);}}
    else app.wc.push([rlat,rlon]);
    if(app.st==='WALK'){updBanner();checkArr(rlat,rlon,now,true);app.map.panTo([rlat,rlon],{animate:true,duration:.3});}
    return;
  }
  acc=acc||100;updGPS(acc);if(acc>80)return;
  const f=app.k.upd(rlat,rlon,acc,now);app.fp={lat:f.lat,lon:f.lon};
  app.um.setLatLng([f.lat,f.lon]);app.uc.setLatLng([f.lat,f.lon]);app.uc.setRadius(max(acc,8));
  app.sd.add(f.lat,f.lon,now);const mv=app.sd.mov();
  const l=app.wc[app.wc.length-1];
  if(mv&&l){const d=hav(l[0],l[1],f.lat,f.lon);if(d>2&&d<30){app.td+=d;app.swd+=d;$('s-dist').textContent=round(app.td);app.wc.push([f.lat,f.lon]);app.wl.setLatLngs(app.wc);}}
  else if(!l)app.wc.push([f.lat,f.lon]);
  if(app.st==='WALK'){updBanner();checkArr(f.lat,f.lon,now,mv);app.map.panTo([f.lat,f.lon],{animate:true,duration:.5});}
}

function startSim(seg){
  if(app.si)clearInterval(app.si);let i=0;const co=seg.co;
  app.si=setInterval(()=>{i++;if(i>=co.length){clearInterval(app.si);app.si=null;onPos(co[co.length-1].lat,co[co.length-1].lon);return;}
  const a=co[i-1],b=co[i];let s=0;const mi=setInterval(()=>{s++;const t=s/5;onPos(a.lat+(b.lat-a.lat)*t,a.lon+(b.lon-a.lon)*t);if(s>=5)clearInterval(mi);},6);},120);
}

function updTime(){if(!app.t0)return;$('s-time').textContent=fmtTime(floor((Date.now()-app.t0)/1000));}
function fmtTime(s){const m=floor(s/60);return`${m}:${(s%60).toString().padStart(2,'0')}`;}
function showToast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000);}

// ═════════════════════════════════════════════════════
//  BOOT
// ═════════════════════════════════════════════════════
function initManual(lat,lon){
  app.manual=true;app.fp={lat,lon};initMap(lat,lon);app.map.setZoom(16);
  $('badge-mode').textContent='📍 手動';$('badge-mode').style.display='';$('tap-hint').style.display='';
  $('loading').classList.add('gone');app.st='READY';
  app.map.on('click',e=>{app.fp={lat:e.latlng.lat,lon:e.latlng.lng};app.um.setLatLng(e.latlng);app.uc.setLatLng(e.latlng);app.uc.setRadius(10);app.map.panTo(e.latlng);$('tap-hint').style.display='none';showToast(`📍 ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`);});
}

async function boot(){
  const le=$('loading'),lt=$('load-text');
  if(!('geolocation' in navigator)||( typeof window.isSecureContext!=='undefined'&&!window.isSecureContext)){
    lt.innerHTML='GPSが利用できません';manualFB(le,lt);return;}
  lt.innerHTML='位置情報を取得中...';
  try{
    const p=await new Promise((ok,ng)=>{let best=null,ba=9999,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;lt.innerHTML=`GPS取得中 ±${round(a)}m (${n}回目)`;if(a<ba){ba=a;best=p;}if(a<=30||n>=8){navigator.geolocation.clearWatch(w);ok(best||p);}},e=>{navigator.geolocation.clearWatch(w);ng(e);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(new Error('t'));},16000);});
    const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
    app.k.upd(lat,lon,acc,Date.now());app.fp={lat,lon};initMap(lat,lon);updGPS(acc);
    app.wid=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),e=>0,{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
    le.classList.add('gone');app.st='READY';showToast(`GPS ±${round(acc)}m`);
  }catch(e){lt.innerHTML='GPS取得失敗';manualFB(le,lt);}
}

function manualFB(le,lt){
  const r=document.createElement('div');r.className='load-reason';r.innerHTML='<b>原因:</b> GPS/HTTPSの問題<br>「手動モード」で地図タップで開始できます';lt.parentElement.appendChild(r);
  const b=document.createElement('button');b.className='lbtn';b.style.cssText='background:var(--accent2);color:var(--bg)';b.textContent='📍 手動モードで開始';b.onclick=()=>initManual(35.6284,139.7387);lt.parentElement.appendChild(b);
  const rb=document.createElement('button');rb.className='lbtn';rb.style.cssText='background:transparent;color:var(--dim);border:1.5px solid var(--border)';rb.textContent='🔄 再試行';rb.onclick=()=>{r.remove();b.remove();rb.remove();lt.innerHTML='再取得中...';boot();};lt.parentElement.appendChild(rb);
}

// ═════════════════════════════════════════════════════
//  EVENTS
// ═════════════════════════════════════════════════════
$('btn-start').onclick=async()=>{
  if(!app.wid&&!app.sim&&!app.manual){app.sim=true;$('badge-mode').textContent='SIM';$('badge-mode').style.display='';}
  $('tap-hint').style.display='none';await startWalk();
};
$('btn-stop').onclick=stopWalk;
document.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>setSt(b.dataset.s));
$('btn-voice').onclick=function(){
  if(voice.on){voice.disable();this.textContent='🔇';this.classList.remove('on');showToast('音声 OFF');}
  else{const m=voice.enable();this.textContent='🔊';this.classList.add('on');showToast(`音声 ON (${{ja:'日本語',en:'英語',beep:'電子音'}[m]})`);}
};
$('btn-history').onclick=()=>{hist.render();$('history-panel').classList.add('open');};
$('hist-close').onclick=()=>$('history-panel').classList.remove('open');

boot();
</script>
