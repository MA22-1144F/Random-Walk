<style>
:root{--bg:#0f1923;--c1:#162231;--c2:#1c2d42;--bd:#253a52;--ac:#ff6b6b;--ac2:#4ecdc4;--ac3:#ffe66d;--tx:#e2e8f0;--dm:#6b849b;--ok:#4ecdc4;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP','DM Mono',sans-serif;background:var(--bg);color:var(--tx);height:100dvh;width:100vw;overflow:hidden;}
#map{position:absolute;inset:0;z-index:1;}

/* Top bar */
#top{position:absolute;top:0;left:0;right:0;z-index:800;padding:8px 14px;padding-top:max(env(safe-area-inset-top,8px),8px);background:linear-gradient(180deg,rgba(15,25,35,.95),rgba(15,25,35,.5) 90%,transparent);pointer-events:none;text-align:center;}
#top.hide{opacity:0;transition:opacity .3s;}
.t-mode{font-size:9px;letter-spacing:.2em;color:var(--dm);font-family:'DM Mono',monospace;}
.t-dir{font-size:28px;font-weight:900;margin:2px 0;}
.t-sub{font-size:11px;color:var(--ac2);font-family:'DM Mono',monospace;}

/* Live stats bar */
#live{position:absolute;top:0;left:0;right:0;z-index:799;padding-top:calc(max(env(safe-area-inset-top,8px),8px) + 70px);display:flex;justify-content:center;gap:20px;pointer-events:none;opacity:0;transition:opacity .3s;}
#live.on{opacity:1;}
.lv{text-align:center;}
.lv-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--ac2);text-shadow:0 1px 8px rgba(78,205,196,.3);}
.lv-l{font-size:8px;letter-spacing:.1em;color:var(--dm);}

/* GPS badge */
#gps{position:absolute;top:6px;right:8px;z-index:810;font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(22,34,49,.9);border:1px solid var(--bd);display:none;pointer-events:none;}
.gd{width:6px;height:6px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px;}

/* BG badge */
#bgb{position:absolute;top:6px;left:8px;z-index:810;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:8px;background:rgba(78,205,196,.15);color:var(--ok);border:1px solid rgba(78,205,196,.3);display:none;pointer-events:none;}

/* Bottom */
#bottom{position:absolute;bottom:0;left:0;right:0;z-index:900;background:var(--c1);border-top:1px solid rgba(255,255,255,.04);padding-bottom:calc(max(env(safe-area-inset-bottom,6px),6px) + 2px);}
#btns{display:flex;gap:8px;justify-content:center;align-items:center;padding:8px 14px;}
.b{font-family:'Noto Sans JP',sans-serif;font-weight:900;border:none;border-radius:50px;cursor:pointer;transition:all .15s;font-size:14px;padding:11px 24px;}
.b:active{transform:scale(.93);}
#b-rand{background:var(--ac);color:#fff;box-shadow:0 2px 12px rgba(255,107,107,.3);}
#b-rec{background:var(--ac2);color:var(--bg);box-shadow:0 2px 12px rgba(78,205,196,.3);}
#b-stop{background:transparent;color:var(--ac);border:2px solid var(--ac);display:none;font-size:13px;padding:9px 22px;}
.ib{width:38px;height:38px;border-radius:50%;border:2px solid var(--bd);background:var(--c2);color:var(--dm);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.ib.on{background:var(--ac3);color:var(--bg);border-color:var(--ac3);}
#tiles{display:flex;gap:4px;justify-content:center;padding:4px 8px;}
.tb{font-size:9px;font-weight:700;padding:3px 9px;border:1px solid var(--bd);border-radius:12px;background:var(--c2);color:var(--dm);cursor:pointer;}
.tb.on{background:var(--ac2);color:var(--bg);border-color:var(--ac2);}

/* Toast */
#toast{position:absolute;top:65px;left:50%;transform:translateX(-50%);z-index:1500;background:var(--c1);border:1px solid var(--bd);padding:7px 16px;border-radius:18px;font-size:11px;box-shadow:0 3px 14px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{opacity:1;}

/* History panel */
#hist{position:absolute;inset:0;z-index:1800;background:var(--bg);transform:translateX(100%);transition:transform .3s;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#hist.open{transform:translateX(0);}
.hh{position:sticky;top:0;background:var(--bg);padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;z-index:1;}
.ht{font-size:17px;font-weight:900;}
.hx{font-size:22px;color:var(--dm);cursor:pointer;padding:2px 8px;}
.he{text-align:center;padding:50px 20px;color:var(--dm);font-size:12px;line-height:1.8;}
.hc{margin:8px 10px;padding:12px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;}
.hc-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hc-d{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac2);}
.hc-mode{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:700;}
.hc-mode.rand{background:rgba(255,107,107,.15);color:var(--ac);}
.hc-mode.rec{background:rgba(78,205,196,.15);color:var(--ac2);}
.hc-del{font-size:14px;color:var(--dm);cursor:pointer;padding:2px 6px;}
.hc-s{display:flex;gap:14px;font-size:12px;margin-bottom:6px;}
.hc-s span{color:var(--ac3);}
.hc-m{width:100%;background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;color:var(--tx);font-size:11px;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:32px;margin-top:4px;}
.hc-m::placeholder{color:var(--dm);}
.hc-br{display:flex;gap:6px;margin-top:6px;}
.hc-btn{font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--bd);background:var(--c2);color:var(--dm);cursor:pointer;}

/* Loading */
#ld{position:absolute;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:opacity .4s;}
#ld.gone{opacity:0;pointer-events:none;}
.sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac2);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#lt{font-size:12px;color:var(--dm);text-align:center;padding:0 20px;line-height:1.7;}
.lr{margin-top:8px;padding:10px 14px;border-radius:8px;background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.2);font-size:10px;color:#aaa;line-height:1.7;max-width:280px;text-align:left;}
.lr b{color:var(--ac);}
.lb{font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;padding:9px 24px;border:none;border-radius:50px;cursor:pointer;margin-top:8px;}

/* Tap hint */
#tap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:810;pointer-events:none;display:none;}
.tap-i{background:rgba(22,34,49,.92);border:1.5px solid var(--ac2);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:700;color:var(--ac2);white-space:nowrap;}

.leaflet-control-attribution{font-size:7px!important;}
.jn{width:16px;height:16px;border-radius:50%;background:var(--ac3);border:2px solid #fff;box-shadow:0 0 8px rgba(255,230,109,.5);}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><div id="lt">位置情報を取得中...</div></div>
<div id="map"></div>
<div id="gps"><span class="gd" id="gps-d"></span><span id="gps-t">---</span></div>
<div id="bgb">🔒 BG</div>
<div id="top" class="hide">
  <div class="t-mode" id="t-mode">RANDOM WALK</div>
  <div class="t-dir" id="t-dir">↑ 北</div>
  <div class="t-sub" id="t-sub">---</div>
</div>
<div id="live">
  <div class="lv"><div class="lv-v" id="l-dist">0</div><div class="lv-l">METERS</div></div>
  <div class="lv"><div class="lv-v" id="l-time">0:00</div><div class="lv-l">TIME</div></div>
  <div class="lv"><div class="lv-v" id="l-junc">0</div><div class="lv-l">交差点</div></div>
</div>
<div id="toast"></div>
<div id="tap"><div class="tap-i">📍 地図をタップして現在地を設定</div></div>

<div id="hist">
  <div class="hh"><span class="ht">📋 散歩の記録</span><span class="hx" id="hx">✕</span></div>
  <div id="hl"></div>
</div>

<div id="bottom">
  <div id="btns">
    <div class="ib" id="b-voice" title="音声">🔇</div>
    <button class="b" id="b-rand">🎲 ランダム散歩</button>
    <button class="b" id="b-rec">🚶 記録散歩</button>
    <button class="b" id="b-stop">■ 終了</button>
    <div class="ib" id="b-hist" title="履歴">📋</div>
  </div>
  <div id="tiles">
    <div class="tb on" data-t="std">標準</div>
    <div class="tb" data-t="dark">ダーク</div>
    <div class="tb" data-t="sat">航空写真</div>
    <div class="tb" data-t="pale">淡色</div>
  </div>
</div>

<script>
// ════════ UTIL ════════
const{sin,cos,atan2,sqrt,PI,floor,round,min,max,random:rnd}=Math,toR=d=>d*PI/180;
function hav(a1,o1,a2,o2){const R=6371e3,dA=toR(a2-a1),dO=toR(o2-o1),a=sin(dA/2)**2+cos(toR(a1))*cos(toR(a2))*sin(dO/2)**2;return R*2*atan2(sqrt(a),sqrt(1-a));}
function bear(a1,o1,a2,o2){const dO=toR(o2-o1),y=sin(dO)*cos(toR(a2)),x=cos(toR(a1))*sin(toR(a2))-sin(toR(a1))*cos(toR(a2))*cos(dO);return(atan2(y,x)*180/PI+360)%360;}
const DA=['↑','↗','→','↘','↓','↙','←','↖'],DN=['北','北東','東','南東','南','南西','西','北西'],DE=['North','NE','East','SE','South','SW','West','NW'];
function bDir(b){const i=round(b/45)%8;return{a:DA[i],n:DN[i],e:DE[i],i};}
function d2poly(lat,lon,co){if(!co||co.length<2)return 1e9;let m=1e9;for(let i=0;i<co.length-1;i++){const a=co[i],b=co[i+1],dx=b.lat-a.lat,dy=b.lon-a.lon,l2=dx*dx+dy*dy;let t=l2?((lat-a.lat)*dx+(lon-a.lon)*dy)/l2:0;t=max(0,min(1,t));m=min(m,hav(lat,lon,a.lat+t*dx,a.lon+t*dy));}return m;}
function fmtT(s){const m=floor(s/60);return`${m}:${(s%60).toString().padStart(2,'0')}`;}
const $=id=>document.getElementById(id);

// ════════ VOICE ════════
const V={on:false,m:'off',syn:window.speechSynthesis||null,jv:null,ev:null,ctx:null,
  init(){if(!this.syn)return;const f=()=>{const v=this.syn.getVoices();this.jv=v.find(x=>x.lang.startsWith('ja'))||null;this.ev=v.find(x=>x.lang.startsWith('en')&&x.localService)||v.find(x=>x.lang.startsWith('en'))||null;};f();if(this.syn)this.syn.onvoiceschanged=f;},
  enable(){this.on=true;this.init();this.m=this.jv?'ja':this.ev?'en':(this.syn?.getVoices().length)?'ja':'beep';this.say('音声オン','Voice on');return this.m;},
  disable(){this.on=false;this.m='off';if(this.syn)this.syn.cancel();},
  say(ja,en,bp){if(!this.on)return;if((this.m==='ja'||this.m==='en')&&this.syn){if(this.syn.paused)this.syn.resume();this.syn.cancel();const u=new SpeechSynthesisUtterance(this.m==='ja'?ja:en);u.lang=this.m==='ja'?'ja-JP':'en-US';const v=this.m==='ja'?this.jv:this.ev;if(v)u.voice=v;u.rate=1.1;u.volume=1;this.syn.speak(u);const ri=setInterval(()=>{if(this.syn.paused)this.syn.resume();if(!this.syn.speaking)clearInterval(ri);},300);setTimeout(()=>clearInterval(ri),10000);}else if(this.m==='beep')this.beep(bp||'i');},
  beep(p){try{if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();const c=this.ctx,n=c.currentTime,b=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.25,n+s);g.gain.exponentialRampToValueAtTime(.01,n+s+d);o.start(n+s);o.stop(n+s+d);};({d:()=>{b(523,0,.12);b(659,.12,.12);b(784,.24,.3)},a:()=>{b(523,0,.1);b(659,.1,.1);b(784,.2,.1);b(1047,.3,.35)},ap:()=>{b(880,0,.1);b(880,.18,.1);b(880,.36,.1)},s:()=>{b(440,0,.2);b(660,.22,.2);b(880,.44,.3)},st:()=>{b(880,0,.2);b(660,.2,.2);b(440,.4,.35)},i:()=>{b(660,0,.12);b(660,.18,.12)}}[p]||function(){})();}catch(e){}}
};V.init();

// ════════ BACKGROUND KEEP-ALIVE (robust) ════════
const BG={
  wl:null,au:null,ctx:null,osc:null,active:false,notif:false,gpsTimer:null,
  async acquire(){
    if(this.active)return;this.active=true;
    // Wake Lock
    if('wakeLock' in navigator)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display='';$('bgb').textContent='🔒 BG';}catch(e){}
    // Visibility re-acquire + GPS re-attach
    document.addEventListener('visibilitychange',this._vc=async()=>{
      if(document.visibilityState==='visible'&&this.active){
        // Re-acquire wake lock
        if('wakeLock' in navigator&&!this.wl)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display='';}catch(e){}
        // Resume audio
        if(this.ctx?.state==='suspended')this.ctx.resume();
        if(this.au?.paused)try{await this.au.play();}catch(e){}
        // Re-attach GPS watcher (Chrome may have killed it)
        if(A.wid!==null){navigator.geolocation.clearWatch(A.wid);A.wid=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:2000,timeout:10000});}
      }
    });
    // Audio keep-alive (MediaStream → <audio>)
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.osc=this.ctx.createOscillator();this.osc.frequency.value=1;
      const g=this.ctx.createGain();g.gain.value=.01;
      const sd=this.ctx.createMediaStreamDestination();
      this.osc.connect(g);g.connect(sd);
      const sg=this.ctx.createGain();sg.gain.value=.001;this.osc.connect(sg);sg.connect(this.ctx.destination);
      this.osc.start();
      this.au=document.createElement('audio');this.au.srcObject=sd.stream;this.au.loop=true;this.au.volume=.01;
      await this.au.play();
    }catch(e){}
    // Backup GPS polling (catches gaps when watchPosition stops)
    this.gpsTimer=setInterval(()=>{
      if(!this.active)return;
      navigator.geolocation.getCurrentPosition(
        p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),
        ()=>{},{enableHighAccuracy:true,maximumAge:3000,timeout:8000}
      );
    },5000); // poll every 5s as safety net
    // Media Session
    if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:'散歩中...',artist:'散歩アプリ'});try{navigator.mediaSession.setActionHandler('pause',()=>{navigator.mediaSession.playbackState='playing'});}catch(e){}}
    // Notifications
    if('Notification' in window){if(Notification.permission==='default')try{this.notif=(await Notification.requestPermission())==='granted';}catch(e){}else this.notif=Notification.permission==='granted';}
  },
  release(){
    this.active=false;
    if(this.gpsTimer){clearInterval(this.gpsTimer);this.gpsTimer=null;}
    if(this.wl)try{this.wl.release();}catch(e){}this.wl=null;
    if(this.au){this.au.pause();this.au.srcObject=null;this.au=null;}
    if(this.osc)try{this.osc.stop();}catch(e){}
    if(this.ctx)try{this.ctx.close();}catch(e){}this.ctx=this.osc=null;
    if(this._vc)document.removeEventListener('visibilitychange',this._vc);
    if('mediaSession' in navigator)try{navigator.mediaSession.metadata=null;}catch(e){}
    $('bgb').style.display='none';
  },
  ms(t,a){if('mediaSession' in navigator)try{navigator.mediaSession.metadata=new MediaMetadata({title:t,artist:a});}catch(e){}},
  notify(t,b){if(!this.notif)return;try{const n=new Notification(t,{body:b,tag:'w',vibrate:[200,100,200]});setTimeout(()=>n.close(),5000);}catch(e){}},
  vib(p){if('vibrate' in navigator)try{navigator.vibrate(p);}catch(e){}}
};

// ════════ GPS FILTER ════════
class KF{constructor(){this.lat=null;this.lon=null;this.v=-1;this.t=0;}
upd(lat,lon,a,ts){a=max(a,3);if(this.v<0){this.lat=lat;this.lon=lon;this.v=a*a;this.t=ts;return{lat,lon};}const dt=(ts-this.t)/1000;if(dt>0){this.v+=dt*2.25;this.t=ts;}const K=this.v/(this.v+a*a);this.lat+=K*(lat-this.lat);this.lon+=K*(lon-this.lon);this.v*=(1-K);return{lat:this.lat,lon:this.lon};}}
class SD{constructor(){this.b=[];this.mx=15;}add(lat,lon,t){this.b.push({lat,lon,t});if(this.b.length>this.mx)this.b.shift();}
mov(){if(this.b.length<4)return false;const f=this.b[0],l=this.b[this.b.length-1],d=hav(f.lat,f.lon,l.lat,l.lon),dt=(l.t-f.t)/1000;return dt>2&&d/dt>.8&&d>5;}}

// ════════ ROAD GRAPH ════════
class G{constructor(){this.N=new Map;this.A=new Map;this.WN=new Map;this.NW=new Map;this.IX=new Set;this.S=[];}
load(d){for(const e of d.elements||[])if(e.type==='node')this.N.set(e.id,{lat:e.lat,lon:e.lon});
for(const e of d.elements||[]){if(e.type!=='way'||!e.nodes)continue;const ns=e.nodes;this.WN.set(e.id,ns);for(let i=0;i<ns.length;i++){const n=ns[i];if(!this.NW.has(n))this.NW.set(n,new Set);this.NW.get(n).add(e.id);if(!this.A.has(n))this.A.set(n,new Set);if(i>0){this.A.get(n).add(ns[i-1]);if(!this.A.has(ns[i-1]))this.A.set(ns[i-1],new Set);this.A.get(ns[i-1]).add(n);}}}
for(const[n,nb]of this.A)if(nb.size>=3||nb.size===1)this.IX.add(n);for(const[n,w]of this.NW)if(w.size>=2&&this.A.has(n))this.IX.add(n);
const vi=new Set;for(const si of this.IX){const sn=this.N.get(si);if(!sn)continue;const nb=this.A.get(si);if(!nb)continue;for(const nx of nb){if(vi.has(`${si}-${nx}`))continue;const p=[si];let c=nx,pv=si,dd=0;while(c&&!this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)dd+=hav(pn.lat,pn.lon,cn.lat,cn.lon);const a=this.A.get(c);let n2=null;for(const x of a)if(x!==pv){n2=x;break;}pv=c;c=n2;}if(c&&this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)dd+=hav(pn.lat,pn.lon,cn.lat,cn.lon);vi.add(`${si}-${p[1]}`);vi.add(`${c}-${p[p.length-2]}`);this.S.push({f:si,t:c,co:p.map(id=>this.N.get(id)).filter(Boolean),d:round(dd)});}}}}
near(lat,lon){let b=null,bd=1e9;for(const n of this.IX){const nd=this.N.get(n);if(!nd)continue;const d=hav(lat,lon,nd.lat,nd.lon);if(d<bd){bd=d;b=n;}}return b;}
from(id){return this.S.filter(s=>s.f===id||s.t===id).map(s=>s.t===id?{f:s.t,t:s.f,co:[...s.co].reverse(),d:s.d}:s);}}

// ════════ HISTORY ════════
const H={K:'wa_h',

save(a){try{localStorage.setItem(this.K,JSON.stringify(a));}catch(e){}},

el.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{if(confirm('削除しますか？')){H.del(b.dataset.d);H.render();}});
el.querySelectorAll('[data-m]').forEach(t=>t.onblur=()=>H.memo(t.dataset.m,t.value));
el.querySelectorAll('[data-sh]').forEach(b=>b.onclick=()=>{const r=this.load().find(x=>x.id===b.dataset.sh);if(r?.path?.length&&A.map){$('hist').classList.remove('open');const ll=r.path.map(p=>[p[0],p[1]]);L.polyline(ll,{color:'#ff6b6b',weight:3,opacity:.5}).addTo(A.map);A.map.fitBounds(L.latLngBounds(ll).pad(.15));toast('過去のルートを表示');}});}};

const TL={std:{u:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',a:'© OSM',z:19},dark:{u:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',a:'© CARTO',z:20},sat:{u:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',a:'© Esri',z:19},pale:{u:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',a:'© CARTO',z:20}};

function initMap(lat,lon){

function updGPS(a){$('gps').style.display='';$('gps-t').textContent=`±${round(a)}m`;$('gps-d').style.background=a<=10?'var(--ok)':a<=25?'var(--ac3)':a<=50?'#e88b3a':'var(--ac)';}

// ════════ WALK START/STOP ════════
async function startWalk(mode){
  A.mode=mode;
  const b=mode==='rand'?$('b-rand'):$('b-rec');b.textContent='取得中...';b.disabled=true;
  if(!A.sim&&!A.manual){try{
    const p=await new Promise((ok,ng)=>{let best=null,ba=1e4,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;b.textContent=`±${round(a)}m (${n})`;if(a<ba){ba=a;best=p;}if(a<=30||n>=6){navigator.geolocation.clearWatch(w);ok(best||p);}},e=>{navigator.geolocation.clearWatch(w);ng(e);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(Error('t'));},16000);});
    const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
    A.kf=new KF;A.kf.upd(lat,lon,acc,Date.now());A.fp={lat,lon};A.sd=new SD;
    A.um.setLatLng([lat,lon]);A.uc.setLatLng([lat,lon]);A.map.setView([lat,lon],17);updGPS(acc);
  }catch(e){if(!A.fp){resetBtns();toast('位置取得失敗');return;}}}
  if(!A.fp){resetBtns();return;}

  if(mode==='rand'){
    b.textContent='道路取得中...';A.g=new G;
    const q=`[out:json][timeout:25];(way(around:800,${A.fp.lat},${A.fp.lon})["highway"~"^(residential|tertiary|secondary|primary|unclassified|living_street|pedestrian|footway|path|steps|service|trunk|cycleway)$"];);(._;>;);out body;`;
    try{const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});if(!r.ok)throw 0;A.g.load(await r.json());
      if(A.g.IX.size<3){resetBtns();toast('交差点が少ない');return;}
      for(const n of A.g.IX){const nd=A.g.N.get(n);if(!nd||(A.g.A.get(n)?.size||0)<3)continue;const ic=L.divIcon({className:'',html:'<div style="width:4px;height:4px;border-radius:50%;background:rgba(255,107,107,.3);border:1px solid rgba(255,107,107,.35)"></div>',iconSize:[4,4],iconAnchor:[2,2]});A.jm.push(L.marker([nd.lat,nd.lon],{icon:ic,interactive:false}).addTo(A.map));}
      toast(`${A.g.IX.size} 交差点`);
    }catch(e){resetBtns();toast('道路取得失敗');return;}
  }

  BG.acquire();
  A.st='WALK';$('b-rand').style.display='none';$('b-rec').style.display='none';$('b-stop').style.display='';
  $('live').classList.add('on');
  A.t0=Date.now();A.tv=setInterval(updTime,1000);
  A.wc=[];A.wl.setLatLngs([]);A.td=0;A.jc=0;A.vis.clear();
  A.vm.forEach(m=>A.map.removeLayer(m));A.vm=[];
  $('l-dist').textContent='0';$('l-junc').textContent='0';$('l-time').textContent='0:00';

  if(mode==='rand'){
    $('top').classList.remove('hide');$('t-mode').textContent='RANDOM WALK';
    const n=A.g.near(A.fp.lat,A.fp.lon);
    if(!n){toast('交差点なし');return;}
    A.ci=n;A.lat=Date.now();A.swd=0;
    V.say('ランダム散歩を開始します。','Random walk started.','s');
    startRoute();
  }else{
    $('top').classList.remove('hide');$('t-mode').textContent='RECORDING';
    $('t-dir').textContent='🚶 記録中';$('t-sub').textContent='歩くだけで経路が記録されます';
    V.say('記録散歩を開始します。','Recording walk started.','s');
  }
}

function endWalk(){
  const dur=A.t0?fmtT(floor((Date.now()-A.t0)/1000)):'0:00';
  H.add({id:Date.now().toString(36)+round(rnd()*1e4).toString(36),date:new Date().toLocaleString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),dist:round(A.td),junc:A.jc,dur,path:A.wc.slice(0,500),memo:'',mode:A.mode==='rand'?'rand':'rec'});
  A.st='IDLE';if(A.tv)clearInterval(A.tv);if(A.si)clearInterval(A.si);
  [A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x);});A.pl=A.nm=A.npl=A.nnm=A.ns=null;
  A.jm.forEach(m=>A.map.removeLayer(m));A.jm=[];
  A.vm.forEach(m=>A.map.removeLayer(m));A.vm=[];A.vis.clear();A.cf=A.cs=null;
  $('top').classList.add('hide');$('live').classList.remove('on');
  resetBtns();
  if(A.manual)$('tap').style.display='';
  V.say(`散歩終了。${round(A.td)}メートル。`,`Done. ${round(A.td)}m.`,'st');
  BG.release();
  toast(`散歩完了！ ${round(A.td)}m / ${fmtT(floor((Date.now()-(A.t0||Date.now()))/1000))}`);
}
function resetBtns(){$('b-stop').style.display='none';$('b-rand').style.display='';$('b-rec').style.display='';$('b-rand').textContent='🎲 ランダム散歩';$('b-rec').textContent='🚶 記録散歩';$('b-rand').disabled=false;$('b-rec').disabled=false;}

// ════════ RANDOM ROUTING ════════
function pick(from,came){const s=A.g.from(from);let c=s.filter(x=>!A.vis.has(x.t));if(!c.length)c=s.filter(x=>x.t!==came);if(!c.length)c=s;let g=c.filter(x=>x.d>20);if(g.length)c=g;return c.length?c[floor(rnd()*c.length)]:null;}
function startRoute(){A.vis.add(A.ci);markV(A.ci);const s=pick(A.ci,A.cf);if(!s){toast('全ルート完了！');V.say('全て通りました。','All done.','st');endWalk();return;}goSeg(s);precomp();}
function precomp(){if(!A.ti){A.ns=null;return;}const tv=A.vis.has(A.ti);A.vis.add(A.ti);A.ns=pick(A.ti,A.ci);if(!tv)A.vis.delete(A.ti);if(A.npl)A.map.removeLayer(A.npl);if(A.nnm)A.map.removeLayer(A.nnm);A.npl=A.nnm=null;if(A.ns){A.npl=L.polyline(A.ns.co.map(c=>[c.lat,c.lon]),{color:'#ffe66d',weight:2,opacity:.2,dashArray:'3,8'}).addTo(A.map);const nn=A.g.N.get(A.ns.t);if(nn){const ic=L.divIcon({className:'',html:'<div style="width:10px;height:10px;border-radius:50%;background:rgba(255,230,109,.2);border:1px solid rgba(255,230,109,.35)"></div>',iconSize:[10,10],iconAnchor:[5,5]});A.nnm=L.marker([nn.lat,nn.lon],{icon:ic,interactive:false}).addTo(A.map);}}}
function goSeg(seg){A.cs=seg;A.cf=A.ci;A.ti=seg.t;A.jc++;A.swd=0;A.lat=Date.now();A.aa=false;
$('l-junc').textContent=A.jc;
if(A.pl)A.map.removeLayer(A.pl);A.pl=L.polyline(seg.co.map(c=>[c.lat,c.lon]),{color:'#ffe66d',weight:4,opacity:.75,dashArray:'8,5'}).addTo(A.map);
if(A.nm)A.map.removeLayer(A.nm);const tn=A.g.N.get(seg.t);if(tn){const ic=L.divIcon({className:'',html:'<div class="jn"></div>',iconSize:[16,16],iconAnchor:[8,8]});A.nm=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(A.map);}
updDir();
const sn=A.g.N.get(seg.f),np=seg.co.length>1?seg.co[1]:A.g.N.get(seg.t);
if(sn&&np){const d=bDir(bear(sn.lat,sn.lon,np.lat,np.lon));V.say(`${d.n}へ。${seg.d}メートル。`,`${d.e}. ${seg.d}m.`,'d');BG.ms(`${d.a} ${d.n} ${seg.d}m`,'散歩アプリ');BG.notify(`🎲 ${d.a} ${d.n}`,`${seg.d}m先`);BG.vib([100,50,100,50,200]);}
if(A.sim||A.manual)startSim(seg);}
function onArr(now){A.vis.add(A.ti);markV(A.ti);toast('🎯 到着！');V.say('到着。','Arrived.','a');BG.notify('🎯 到着','');BG.vib([100,80,100,80,300]);
[A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x);});A.pl=A.nm=A.npl=A.nnm=null;
A.ci=A.ti;A.lat=now;const s=A.ns||pick(A.ci,A.cf);A.ns=null;if(!s){toast('全ルート完了！');endWalk();return;}goSeg(s);precomp();}
function onDetour(nid,now){A.vis.add(nid);markV(nid);toast('🔄 再計算');V.say('ルート再計算。','Recalculating.','ap');BG.vib([300,100,300]);
[A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x);});A.pl=A.nm=A.npl=A.nnm=null;A.ns=null;
A.ci=nid;A.cf=null;A.lat=now;A.jc++;$('l-junc').textContent=A.jc;
const s=pick(nid,null);if(!s){endWalk();return;}goSeg(s);precomp();}
function markV(n){const nd=A.g.N.get(n);if(!nd)return;const ic=L.divIcon({className:'',html:'<div style="width:7px;height:7px;border-radius:50%;background:rgba(78,205,196,.2);border:1px solid rgba(78,205,196,.3)"></div>',iconSize:[7,7],iconAnchor:[3,3]});A.vm.push(L.marker([nd.lat,nd.lon],{icon:ic,interactive:false,zIndexOffset:-100}).addTo(A.map));}
function updDir(){if(!A.cs||!A.fp)return;const t=A.g.N.get(A.ti);if(!t)return;const dist=hav(A.fp.lat,A.fp.lon,t.lat,t.lon),d=bDir(bear(A.fp.lat,A.fp.lon,t.lat,t.lon));
$('t-dir').textContent=d.a+' '+d.n;$('t-dir').style.color='var(--ac3)';
let sub=`${round(dist)}m`;if(A.ns){const ns=A.g.N.get(A.ns.f),np=A.ns.co.length>1?A.ns.co[1]:A.g.N.get(A.ns.t);if(ns&&np){const d2=bDir(bear(ns.lat,ns.lon,np.lat,np.lon));sub+=` → ${d2.a}${d2.n} ${A.ns.d}m`;}}
$('t-sub').textContent=sub;
if(!A.aa&&dist<40&&A.swd>10){A.aa=true;V.say(`まもなく交差点。${round(dist)}メートル。`,`Approaching. ${round(dist)}m.`,'ap');BG.notify('⚠️ 交差点',round(dist)+'m');BG.vib([200,100,200,100,200]);}
BG.ms(`${d.a} ${d.n} ${round(dist)}m`,'散歩アプリ');}

// ════════ ARRIVAL DETECTION (route-deviation based) ════════
function checkArr(lat,lon,now,mv){
  if(!mv||A.st!=='WALK'||A.mode!=='rand')return;
  if(now-A.lat<5000)return;
  const t=A.g.N.get(A.ti);
  if(t){const d=hav(lat,lon,t.lat,t.lon),sl=A.cs?.d||999;if(d<25&&(A.swd>sl*.35||sl<30)){A.st='ARR';onArr(now);return;}}
  if(A.swd<20||!A.cs)return;
  if(d2poly(lat,lon,A.cs.co)<50)return; // still on route
  const skip=new Set([A.ci,A.ti,A.cf]);if(A.ns)skip.add(A.ns.t);
  for(const nid of A.g.IX){if(skip.has(nid))continue;const nd=A.g.N.get(nid);if(!nd)continue;if(hav(lat,lon,nd.lat,nd.lon)<25){A.st='ARR';onDetour(nid,now);return;}}
}

// ════════ GPS UPDATE ════════
function onPos(rlat,rlon,acc){
  const now=Date.now();
  // Dedup: ignore if same second (backup poll overlap)
  if(now-A.lastGpsTime<800)return;
  A.lastGpsTime=now;

  if(A.sim||A.manual){
    A.fp={lat:rlat,lon:rlon};A.um.setLatLng([rlat,rlon]);A.uc.setLatLng([rlat,rlon]);A.uc.setRadius(5);
    const l=A.wc[A.wc.length-1];
    if(l){const d=hav(l[0],l[1],rlat,rlon);if(d>1){A.td+=d;A.swd+=d;$('l-dist').textContent=round(A.td);A.wc.push([rlat,rlon]);A.wl.setLatLngs(A.wc);}}
    else A.wc.push([rlat,rlon]);
    if(A.st==='WALK'){if(A.mode==='rand')updDir();checkArr(rlat,rlon,now,true);A.map.panTo([rlat,rlon],{animate:true,duration:.3});}
    return;
  }
  acc=acc||100;updGPS(acc);if(acc>80)return;
  const f=A.kf.upd(rlat,rlon,acc,now);A.fp={lat:f.lat,lon:f.lon};
  A.um.setLatLng([f.lat,f.lon]);A.uc.setLatLng([f.lat,f.lon]);A.uc.setRadius(max(acc,8));
  A.sd.add(f.lat,f.lon,now);const mv=A.sd.mov();
  const l=A.wc[A.wc.length-1];
  if(mv&&l){const d=hav(l[0],l[1],f.lat,f.lon);if(d>2&&d<30){A.td+=d;A.swd+=d;$('l-dist').textContent=round(A.td);A.wc.push([f.lat,f.lon]);A.wl.setLatLngs(A.wc);}}
  else if(!l)A.wc.push([f.lat,f.lon]);
  if(A.st==='WALK'){if(A.mode==='rand')updDir();checkArr(f.lat,f.lon,now,mv);A.map.panTo([f.lat,f.lon],{animate:true,duration:.5});}
}
function startSim(seg){if(A.si)clearInterval(A.si);let i=0;const co=seg.co;A.si=setInterval(()=>{i++;if(i>=co.length){clearInterval(A.si);A.si=null;onPos(co[co.length-1].lat,co[co.length-1].lon);return;}const a=co[i-1],b=co[i];let s=0;const mi=setInterval(()=>{s++;const t=s/5;onPos(a.lat+(b.lat-a.lat)*t,a.lon+(b.lon-a.lon)*t);if(s>=5)clearInterval(mi);},6);},120);}
function updTime(){if(!A.t0)return;$('l-time').textContent=fmtT(floor((Date.now()-A.t0)/1000));}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000);}

// ════════ BOOT ════════
function initManual(lat,lon){A.manual=true;A.fp={lat,lon};initMap(lat,lon);A.map.setZoom(16);$('tap').style.display='';$('ld').classList.add('gone');A.st='READY';A.map.on('click',e=>{A.fp={lat:e.latlng.lat,lon:e.latlng.lng};A.um.setLatLng(e.latlng);A.uc.setLatLng(e.latlng);A.map.panTo(e.latlng);$('tap').style.display='none';toast(`📍 ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);});}
async function boot(){
  const lt=$('lt');
  if(!('geolocation' in navigator)||(typeof window.isSecureContext!=='undefined'&&!window.isSecureContext)){lt.innerHTML='GPSが利用できません';manFB();return;}
  lt.innerHTML='GPS取得中...';
  try{const p=await new Promise((ok,ng)=>{let best=null,ba=1e4,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;lt.innerHTML=`±${round(a)}m (${n}回)`;if(a<ba){ba=a;best=p;}if(a<=30||n>=8){navigator.geolocation.clearWatch(w);ok(best||p);}},e=>{navigator.geolocation.clearWatch(w);ng(e);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(Error('t'));},16000);});
    const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
    A.kf.upd(lat,lon,acc,Date.now());A.fp={lat,lon};initMap(lat,lon);updGPS(acc);
    A.wid=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
    $('ld').classList.add('gone');A.st='READY';toast(`GPS ±${round(acc)}m`);
  }catch(e){lt.innerHTML='GPS取得失敗';manFB();}
}
function manFB(){const p=$('lt').parentElement;const r=document.createElement('div');r.className='lr';r.innerHTML='<b>原因:</b> GPS/HTTPS問題<br>手動モードで地図タップから開始可能';p.appendChild(r);const b=document.createElement('button');b.className='lb';b.style.cssText='background:var(--ac2);color:var(--bg)';b.textContent='📍 手動モード';b.onclick=()=>initManual(35.6284,139.7387);p.appendChild(b);const rb=document.createElement('button');rb.className='lb';rb.style.cssText='background:transparent;color:var(--dm);border:1.5px solid var(--bd)';rb.textContent='🔄 再試行';rb.onclick=()=>{r.remove();b.remove();rb.remove();$('lt').innerHTML='再取得中...';boot();};p.appendChild(rb);}

// ════════ EVENTS ════════
$('b-rand').onclick=()=>{if(!A.wid&&!A.sim&&!A.manual)A.sim=true;$('tap').style.display='none';startWalk('rand');};
$('b-rec').onclick=()=>{if(!A.wid&&!A.sim&&!A.manual)A.sim=true;$('tap').style.display='none';startWalk('rec');};
$('b-stop').onclick=endWalk;
document.querySelectorAll('.tb').forEach(b=>b.onclick=()=>setTile(b.dataset.t));
$('b-voice').onclick=function(){if(V.on){V.disable();this.textContent='🔇';this.classList.remove('on');toast('音声 OFF');}else{const m=V.enable();this.textContent='🔊';this.classList.add('on');toast(`音声 ON (${{ja:'日本語',en:'英語',beep:'電子音'}[m]})`);}};
$('b-hist').onclick=()=>{H.render();$('hist').classList.add('open');};
$('hx').onclick=()=>$('hist').classList.remove('open');
boot();
</script>
</body>
