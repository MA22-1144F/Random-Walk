<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ランダム散歩</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a1a2e;--card:#16213e;--card-border:#0f3460;--accent:#e94560;--accent2:#53d8fb;--accent3:#ffc857;--text:#e8e8e8;--text-dim:#7a8ba6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP','DM Mono',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;width:100vw;overflow:hidden;position:relative;}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;}

  #direction-banner{position:absolute;top:0;left:0;right:0;z-index:1000;padding:12px 16px;padding-top:max(env(safe-area-inset-top,12px),12px);background:linear-gradient(180deg,rgba(26,26,46,0.95) 0%,rgba(26,26,46,0.7) 80%,transparent 100%);text-align:center;pointer-events:none;transition:opacity 0.4s;}
  #direction-banner.hidden{opacity:0;}
  .dir-label{font-size:11px;letter-spacing:0.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;font-family:'DM Mono',monospace;}
  .dir-main{font-size:32px;font-weight:900;line-height:1.2;text-shadow:0 2px 20px rgba(233,69,96,0.4);}
  .dir-sub{font-size:13px;color:var(--accent2);margin-top:4px;font-family:'DM Mono',monospace;}

  #gps-info{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;transition:opacity 0.3s;}
  #gps-info.hidden{opacity:0;}
  .gps-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border-radius:12px;background:rgba(22,33,62,0.9);border:1px solid var(--card-border);}
  .gps-dot{width:7px;height:7px;border-radius:50%;transition:background 0.3s;}

  #bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;padding:0 16px 16px;padding-bottom:calc(max(env(safe-area-inset-bottom,16px),16px) + 60px);background:linear-gradient(0deg,rgba(26,26,46,0.97) 0%,rgba(26,26,46,0.88) 55%,rgba(26,26,46,0.5) 80%,transparent 100%);display:flex;flex-direction:column;align-items:center;gap:10px;}
  .stats-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center;}
  .stat-item{text-align:center;min-width:60px;}
  .stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--accent2);}
  .stat-label{font-size:10px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;}
  .btn-main{font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;padding:14px 44px;border:none;border-radius:50px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .btn-main:active{transform:scale(0.95);}
  .btn-start{background:var(--accent);color:#fff;box-shadow:0 4px 24px rgba(233,69,96,0.4);}
  .btn-stop{background:transparent;color:var(--accent);border:2px solid var(--accent);}
  .btn-row{display:flex;gap:10px;align-items:center;}

  /* Voice toggle */
  .voice-toggle{
    width:44px;height:44px;border-radius:50%;border:2px solid var(--card-border);
    background:var(--card);color:var(--text-dim);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    -webkit-tap-highlight-color:transparent;flex-shrink:0;
  }
  .voice-toggle.active{background:var(--accent3);color:var(--bg);border-color:var(--accent3);box-shadow:0 2px 12px rgba(255,200,87,0.3);}
  .voice-toggle:active{transform:scale(0.9);}

  /* Wake lock indicator */
  #wake-badge{
    position:absolute;top:10px;left:10px;z-index:1100;
    padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;
    font-family:'DM Mono',monospace;display:none;
    background:rgba(69,185,124,0.2);color:#45b97c;border:1px solid rgba(69,185,124,0.4);
  }

  #style-switcher{position:absolute;bottom:0;left:0;right:0;z-index:1001;padding-bottom:max(env(safe-area-inset-bottom,8px),8px);display:flex;justify-content:center;gap:6px;padding-top:6px;background:rgba(26,26,46,0.97);border-top:1px solid rgba(255,255,255,0.06);}
  .style-btn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border:1.5px solid var(--card-border);border-radius:16px;background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .style-btn.active{background:var(--accent2);color:var(--bg);border-color:var(--accent2);}

  #roulette-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(26,26,46,0.85);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px);}
  #roulette-overlay.active{opacity:1;pointer-events:auto;}
  .roulette-text{font-size:14px;color:var(--accent3);margin-bottom:16px;font-family:'DM Mono',monospace;letter-spacing:0.2em;animation:pulse 0.6s ease infinite alternate;}
  .roulette-dir{font-size:64px;font-weight:900;transition:all 0.08s;}
  .roulette-name{font-size:22px;font-weight:700;margin-top:8px;color:var(--accent2);}

  #loading-screen{position:absolute;top:0;left:0;right:0;bottom:0;z-index:3000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.5s;}
  #loading-screen.hidden{opacity:0;pointer-events:none;}
  .loader{width:48px;height:48px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-text{font-size:14px;color:var(--text-dim);text-align:center;padding:0 24px;line-height:1.7;}

  #toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:1500;background:var(--card);border:1px solid var(--card-border);padding:10px 20px;border-radius:24px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
  #toast.show{opacity:1;}
  #sim-badge{position:absolute;top:10px;right:10px;z-index:1100;background:var(--accent3);color:var(--bg);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:none;}
  #manual-badge{position:absolute;top:10px;right:10px;z-index:1100;background:var(--accent2);color:var(--bg);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:none;}
  #tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1100;pointer-events:none;display:none;}
  .tap-hint-inner{background:rgba(22,33,62,0.92);border:1.5px solid var(--accent2);padding:14px 24px;border-radius:16px;font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;animation:tapPulse 2s ease infinite;box-shadow:0 4px 30px rgba(83,216,251,0.2);}
  @keyframes tapPulse{0%,100%{opacity:0.85;transform:scale(1);}50%{opacity:1;transform:scale(1.03);}}
  .loading-reason{margin-top:12px;padding:12px 20px;border-radius:12px;background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3);font-size:11px;color:#ccc;line-height:1.8;max-width:320px;text-align:left;}
  .loading-reason b{color:var(--accent);}
  .loading-btn{font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;padding:12px 32px;border:none;border-radius:50px;cursor:pointer;margin-top:12px;background:var(--accent2);color:var(--bg);-webkit-tap-highlight-color:transparent;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{from{opacity:0.5;}to{opacity:1;}}
  .leaflet-control-attribution{font-size:9px !important;}
  .junction-next{width:20px;height:20px;border-radius:50%;background:var(--accent3);border:2px solid #fff;box-shadow:0 0 12px rgba(255,200,87,0.6);}
</style>
</head>
<body>
<div id="loading-screen"><div class="loader"></div><div class="loading-text" id="loading-text">位置情報を取得中...</div></div>
<div id="map"></div>
<div id="gps-info" class="hidden"><div class="gps-badge"><div class="gps-dot" id="gps-dot"></div><span id="gps-acc-text">GPS: ---</span></div></div>
<div id="wake-badge">🔒 画面維持</div>
<div id="direction-banner" class="hidden">
  <div class="dir-label">次の方向</div>
  <div class="dir-main" id="dir-main">↑ 北</div>
  <div class="dir-sub" id="dir-sub">次の交差点まで 120m</div>
</div>
<div id="roulette-overlay">
  <div class="roulette-text">▶ 方向を選択中...</div>
  <div class="roulette-dir" id="roulette-dir">↑</div>
  <div class="roulette-name" id="roulette-name">北</div>
</div>
<div id="toast"></div>
<div id="sim-badge">SIMULATION</div>
<div id="manual-badge" style="display:none;">📍 手動モード</div>
<div id="tap-hint" style="display:none;"><div class="tap-hint-inner">📍 地図をタップして現在地を設定</div></div>
<div id="bottom-panel">
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-item"><div class="stat-val" id="stat-dist">0</div><div class="stat-label">m 歩行</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-junctions">0</div><div class="stat-label">交差点</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-time">0:00</div><div class="stat-label">経過</div></div>
  </div>
  <div class="btn-row">
    <button class="voice-toggle" id="btn-voice" title="音声ガイド">🔇</button>
    <button class="btn-main btn-start" id="btn-start">🎲 ランダム散歩 開始</button>
    <button class="btn-main btn-stop" id="btn-stop" style="display:none;">■ 終了</button>
  </div>
</div>
<div id="style-switcher">
  <button class="style-btn active" data-style="standard">標準</button>
  <button class="style-btn" data-style="dark">ダーク</button>
  <button class="style-btn" data-style="satellite">航空写真</button>
  <button class="style-btn" data-style="pale">淡色</button>
  <button class="style-btn" data-style="topo">地形</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){const R=6371e3,toR=d=>d*Math.PI/180,dLat=toR(lat2-lat1),dLon=toR(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function bearing(lat1,lon1,lat2,lon2){const toR=d=>d*Math.PI/180,dLon=toR(lon2-lon1),y=Math.sin(dLon)*Math.cos(toR(lat2)),x=Math.cos(toR(lat1))*Math.sin(toR(lat2))-Math.sin(toR(lat1))*Math.cos(toR(lat2))*Math.cos(dLon);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
const DIR_ARROWS=['↑','↗','→','↘','↓','↙','←','↖'];
const DIR_NAMES=['北','北東','東','南東','南','南西','西','北西'];
const DIR_NAMES_EN=['North','Northeast','East','Southeast','South','Southwest','West','Northwest'];
function bearingToDir(b){const i=Math.round(b/45)%8;return{arrow:DIR_ARROWS[i],name:DIR_NAMES[i],nameEn:DIR_NAMES_EN[i],idx:i};}

// ═══════════════════════════════════════════════════════════
//  VOICE GUIDE — Japanese → English → Beep fallback
// ═══════════════════════════════════════════════════════════
class VoiceGuide {
  constructor() {
    this.enabled = false;
    this.mode = 'off'; // 'ja', 'en', 'beep', 'off'
    this.synth = window.speechSynthesis || null;
    this.jaVoice = null;
    this.enVoice = null;
    this.audioCtx = null;
    this._detectVoices();
    // Voices may load async
    if (this.synth) {
      this.synth.onvoiceschanged = () => this._detectVoices();
    }
  }

  _detectVoices() {
    if (!this.synth) return;
    const voices = this.synth.getVoices();
    // Find Japanese voice
    this.jaVoice = voices.find(v => v.lang.startsWith('ja')) || null;
    // Find English voice
    this.enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                   voices.find(v => v.lang.startsWith('en')) || null;
    console.log('Voices:', this.jaVoice?.name, this.enVoice?.name);
  }

  _getAudioCtx() {
    if (!this.audioCtx) {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    return this.audioCtx;
  }

  enable() {
    this.enabled = true;
    this._detectVoices();
    // Determine best mode
    if (this.synth && this.jaVoice) {
      this.mode = 'ja';
    } else if (this.synth && this.enVoice) {
      this.mode = 'en';
    } else if (this.synth && this.synth.getVoices().length > 0) {
      // Has some voice, try Japanese text with default voice
      this.mode = 'ja';
    } else {
      this.mode = 'beep';
    }
    console.log('Voice mode:', this.mode);
    // Test with a short utterance to activate audio on mobile
    this.speak('音声ガイドオン', 'Voice guide on', null);
    return this.mode;
  }

  disable() {
    this.enabled = false;
    this.mode = 'off';
    if (this.synth) this.synth.cancel();
  }

  speak(jaText, enText, beepPattern) {
    if (!this.enabled) return;

    // Chrome pauses SpeechSynthesis in background — resume workaround
    if (this.synth && this.synth.paused) {
      this.synth.resume();
    }

    if ((this.mode === 'ja' || this.mode === 'en') && this.synth) {
      this.synth.cancel();
      const text = this.mode === 'ja' ? jaText : enText;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = this.mode === 'ja' ? 'ja-JP' : 'en-US';
      const v = this.mode === 'ja' ? this.jaVoice : this.enVoice;
      if (v) u.voice = v;
      u.rate = this.mode === 'ja' ? 1.1 : 1.0;
      u.pitch = 1.0;
      u.volume = 1.0;
      this.synth.speak(u);

      // Chrome bug: speech pauses after ~15s in background
      // Workaround: set a timer to resume if paused
      const resumeCheck = setInterval(() => {
        if (this.synth.paused) this.synth.resume();
        if (!this.synth.speaking) clearInterval(resumeCheck);
      }, 300);
      setTimeout(() => clearInterval(resumeCheck), 10000);
    } else if (this.mode === 'beep') {
      this._playBeep(beepPattern || 'info');
    }
  }

  // Direction beep patterns
  _playBeep(pattern) {
    try {
      const ctx = this._getAudioCtx();
      const now = ctx.currentTime;

      const beep = (freq, start, dur) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, now + start);
        gain.gain.exponentialRampToValueAtTime(0.01, now + start + dur);
        osc.start(now + start);
        osc.stop(now + start + dur);
      };

      switch (pattern) {
        case 'direction': // Cheerful rising: direction decided
          beep(523, 0, 0.15); beep(659, 0.15, 0.15); beep(784, 0.3, 0.3);
          break;
        case 'approaching': // Warning: approaching intersection
          beep(880, 0, 0.1); beep(880, 0.2, 0.1); beep(880, 0.4, 0.1);
          break;
        case 'arrived': // Success: arrived
          beep(523, 0, 0.12); beep(659, 0.12, 0.12); beep(784, 0.24, 0.12); beep(1047, 0.36, 0.4);
          break;
        case 'start': // Walk start
          beep(440, 0, 0.2); beep(660, 0.25, 0.2); beep(880, 0.5, 0.3);
          break;
        case 'stop': // Walk end
          beep(880, 0, 0.2); beep(660, 0.2, 0.2); beep(440, 0.4, 0.4);
          break;
        case 'left': beep(440, 0, 0.2); beep(330, 0.15, 0.3); break;
        case 'right': beep(440, 0, 0.2); beep(660, 0.15, 0.3); break;
        case 'straight': beep(550, 0, 0.3); beep(550, 0.35, 0.3); break;
        default: // info
          beep(660, 0, 0.15); beep(660, 0.2, 0.15);
      }
    } catch (e) { console.warn('Beep error:', e); }
  }

  // High-level guidance methods
  announceDirection(dirName, dirNameEn, distM, dirIdx) {
    // Determine relative direction for beep
    let beepType = 'direction';
    if (dirIdx >= 7 || dirIdx <= 1) beepType = 'straight'; // roughly forward
    else if (dirIdx >= 2 && dirIdx <= 4) beepType = 'right';
    else beepType = 'left';

    this.speak(
      `${dirName}へ進んでください。${distM}メートル先の交差点まで。`,
      `Go ${dirNameEn}. ${distM} meters to the next intersection.`,
      beepType
    );
  }

  announceApproaching(distM) {
    this.speak(
      `まもなく交差点です。あと${distM}メートル。`,
      `Approaching intersection. ${distM} meters.`,
      'approaching'
    );
  }

  announceArrived() {
    this.speak(
      '交差点に到着しました。次の方向を選びます。',
      'Arrived at intersection. Choosing next direction.',
      'arrived'
    );
  }

  announceStart() {
    this.speak('散歩を開始します。', 'Starting walk.', 'start');
  }

  announceStop(distM, junctions) {
    this.speak(
      `散歩が終了しました。${distM}メートル、${junctions}個の交差点を通過しました。`,
      `Walk finished. ${distM} meters, ${junctions} intersections.`,
      'stop'
    );
  }
}

// ═══════════════════════════════════════════════════════════
//  BACKGROUND KEEP-ALIVE
//  Uses <audio> element with generated stream → Android treats
//  Chrome as "playing media" and keeps it alive even with screen off.
//  + Media Session API for lock screen info
//  + Notification API for alerts through lock screen
// ═══════════════════════════════════════════════════════════
class BackgroundKeepAlive {
  constructor() {
    this.wakeLock = null;
    this.audioEl = null;
    this.audioCtx = null;
    this.oscNode = null;
    this.gainNode = null;
    this.streamDest = null;
    this.notifPermission = false;
    this.active = false;
  }

  async acquire() {
    if (this.active) return;
    this.active = true;

    // 1. Wake Lock API (prevents screen from turning off)
    if ('wakeLock' in navigator) {
      try {
        this.wakeLock = await navigator.wakeLock.request('screen');
        this.wakeLock.addEventListener('release', () => {
          document.getElementById('wake-badge').textContent = '🎵 BGモード';
        });
        document.getElementById('wake-badge').style.display = '';
        document.getElementById('wake-badge').textContent = '🔒 画面維持';
      } catch (e) { console.warn('Wake lock failed:', e); }
    }

    // Re-acquire wake lock when returning to foreground
    document.addEventListener('visibilitychange', this._onVisChange = async () => {
      if (document.visibilityState === 'visible' && this.active) {
        if ('wakeLock' in navigator) {
          try {
            this.wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('wake-badge').textContent = '🔒 画面維持';
            document.getElementById('wake-badge').style.display = '';
          } catch (e) {}
        }
        // Resume audio context if suspended
        if (this.audioCtx && this.audioCtx.state === 'suspended') {
          this.audioCtx.resume();
        }
      }
    });

    // 2. CRITICAL: Audio element with MediaStream — this is what keeps
    //    Chrome alive on Android when screen is off.
    //    Web Audio API alone gets suspended, but an <audio> element
    //    playing a MediaStream is treated as real media playback.
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Very quiet oscillator (not silent — must produce actual audio)
      this.oscNode = this.audioCtx.createOscillator();
      this.oscNode.frequency.value = 1; // 1Hz — inaudible
      this.oscNode.type = 'sine';

      this.gainNode = this.audioCtx.createGain();
      this.gainNode.gain.value = 0.01; // extremely quiet but not zero

      // Route through MediaStreamDestination → <audio> element
      this.streamDest = this.audioCtx.createMediaStreamDestination();
      this.oscNode.connect(this.gainNode);
      this.gainNode.connect(this.streamDest);

      // Also connect to actual destination so AudioContext stays active
      const silentGain = this.audioCtx.createGain();
      silentGain.gain.va
